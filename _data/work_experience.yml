  location: "Washington, D.C., USA"
  start_date: "October 2018"
  end_date: "February 2023"
  description: "Led education data and analytics work as Lead Economist, EdTech Fellow, and Education Statistics Coordinator. Co-developed the Learning Poverty measure and Global Target. Created the EduAnalytics team and built a data analytics architecture harmonizing over 1,000 learning assessments across countries, with standards for reproducibility and quality assurance."

- position: "Lead Economist"
  organization: "World Bank Poverty and Equity Global Practice"
  location: "Washington, D.C., USA"
  start_date: "June 2015"
  end_date: "September 2018"
  description: "Led the Global Solution Group on Welfare Measurement and Statistical Capacity, and the Data for Goals initiative. Built a harmonization architecture for 1,200+ household surveys used in global poverty monitoring. Led poverty mapping and capacity building with national statistical agencies across EU member states (Latvia, Bulgaria, Croatia, Romania, Hungary), including the Croatian Index of Multiple Deprivation used for EU Structural Funds allocation."

