- position: "Chief Statistician & Deputy Director, Data and Analytics"
  organization: "UNICEF Headquarters"
  location: "New York, USA"
  start_date: "February 2023"
  end_date: "Present"
  description: "UNICEF's first Chief Statistician, leading the organization's global data and statistical work across all child-related domains. Oversees the production and delivery of over 730 child-related indicators, including 19 SDG indicators, with emphasis on reproducible and scalable analytics. Provides technical assistance to national statistical offices on child- and family-centric household surveys, including the Multiple Indicator Cluster Surveys (MICS) program."

- position: "Lead Economist & EdTech Fellow"
