    \ a la pobreza en Centroamerica. UNDP and IPEA. (Apendices 2 y 3 y Capitulo 5)\
    \ Barros, R.P. Carvalho, M. Franco, S. (2003) La igualdad como estrategia de combate\
    \ a la pobreza en Panamá (Capítulo 6). Panama: PNUD. www.undp.org.pa/_pnud/Documents/libro.pdf\
    \ ECLAC (2002) Meeting the Millennium Poverty Reduction Targets in Latin America\
    \ and the Caribbean. Santiago, Chile: ECLAC-IPEA-UNDP. http://www.eclac.cl/publicaciones/xml/5/12555/lcg2188i.pdf\
    \ Bourguignon, F. (2002), \x93The Growth Elasticity of Poverty Reduction: explaining\
    \ heterogeneity across countries and time periods\x94, in T. Eichler and S. Turnovsky\
    \ (eds.), Growth and Inequality, Cambridge: MIT Press. Bigsten, A. and A. Shimeles\
