changemean:
  title: changemean
  short_description: Income and Inequalily Contribution on Poverty Variation
  syntax: changemean varlist [weight] [if exp] [in range] [ , by(groupvar) base(refcat)
    varpl(varname) pline(number) h h2 pgr igr w fgt1 fgt2 fgt3 fgt4 fgt5 fgt6 fgt7
    fgt8 fgt9 chu1 chu2 chu3 chu4 chu5 s thon tak ] fweights, are allowed; see help
    weights.
  description: 'changemean decompose the poverty gap among two or more subgroups by
    income and inequality. Several

    measures of poverty can be used. If no specific measures is requested the default
    value is the head count ratio

    [FGT(0)]. This version of the program does not support the computation of multiple
    poverty measures.

    varlist Income variable'
  options:
  - by(groupvar) provide the variable name that defided the groups of comparison.
    The default comparation group is computed as half the median of varlist.
  - base(refcat) sets the value of the comparation categoric group that defided the
    base group. If the base category was not defined changemean will use the first
    category.
  - varpl(varname) provide the variable name containing the values poverty line.
  - pline(#) sets the value of the poverty line. The default poverty line is computed
    as half the median of varname. The following options specify the poverty measure
    to be computed.
  - 'h : headcount ratio [FGT(0)] (default value)'
  - 'h2 : extremem poverty headcount ratio'
  - 'pgr : poverty gap ratio [FGT(1)]'
  - 'igr : income gap ratio'
  - 'w : Watts index'
  - 's : Sen index'
  - 'tak : Takayama index'
  - 'thon : Thon index'
  - 'fgt1 : Foster, Greer and Thorbecke - FGT(0.5)'
  - 'fgt2 : Foster, Greer and Thorbecke - FGT(1.5)'
  - 'fgt3 : Foster, Greer and Thorbecke - FGT(2)'
  - 'fgt4 : Foster, Greer and Thorbecke - FGT(2.5)'
  - 'fgt5 : Foster, Greer and Thorbecke - FGT(3)'
  - 'fgt6 : Foster, Greer and Thorbecke - FGT(3.5)'
  - 'fgt7 : Foster, Greer and Thorbecke - FGT(4)'
  - 'fgt8 : Foster, Greer and Thorbecke - FGT(4.5)'
  - 'fgt9 : Foster, Greer and Thorbecke - FGT(5)'
  - 'chu1 : Clark, Ulph and Hemming index with beta of 0.10'
  - 'chu2 : Clark, Ulph and Hemming index with beta of 0.25'
  - 'chu3 : Clark, Ulph and Hemming index with beta of 0.50'
  - 'chu4 : Clark, Ulph and Hemming index with beta of 0.75'
  - 'chu5 : Clark, Ulph and Hemming index with beta of 0.90'
  examples:
  - . changemean rdpc
  - . changemean rdpc [fw=peso]
  - . changemean rdpc [fw=peso], by(educa)
  - . changemean rdpc [fw=peso], by(educa) varpl(lp)
  - . changemean rdpc [fw=peso], by(educa) line(240)
  - . changemean rdpc [fw=peso], by(educa) base(1)
  - . changemean rdpc [fw=peso], by(educa) base(1) varpl(lp)
  - . changemean rdpc [fw=peso], by(educa) base(3) line(240)
  stored_results: []
  references: []
  authors:
  - Joao Pedro Azevedo
  - jazevedo@worldbank.org
  - Samuel Franco
  - sam@ipea.gov.br
  acknowledgements: ''
  also_see: []
  version: ''
  other_income_and_inequalily_contribution_on_poverty_variation: changemean varlist
    [weight] [if exp] [in range] [ , by(groupvar) base(refcat) varpl(varname) pline(number)
    h h2 pgr igr w fgt1 fgt2 fgt3 fgt4 fgt5 fgt6 fgt7 fgt8 fgt9 chu1 chu2 chu3 chu4
    chu5 s thon tak ] fweights, are allowed; see help weights.
  remarks: 'The output table of change mean describe the following indicators: Index
    Presents the comparision categories. Baseli Shows the poverty rate (head count
    ratio) of the individuals on the base line category. Origin Shows the poverty
    rate (head count ratio) of the individuals on each one of the comparison categories.
    Income Poverty rate of the baseline group with the average income of the comparsion
    group. Inequa Poverty rate of the baseline group with the inequality of the comparsion
    group. Gap Poverty gap (head count ratio of base line category - head count ratio
    of comparsin category). RawInc Raw contribution of the income differential on
    the poverty gap. RawIne Raw contribution of the inequality differential on the
    poverty gap. RelInc Relative contribution of the income differential on the poverty
    gap. RelIne Relative contribution of the inequality differential on the poverty
    gap.'
  help_file_type: hlp
grqreg:
  title: grqreg
  short_description: Graph the coefficients of a Quantile Regression
  syntax: grqreg [varlist] [weight] [, qmin(integer) qmax(integer) qstep(integer)
    quantiles(#[#[# ...]]) level(confidence interval) title(title list) mfx(type)
    cons ci ols olsci compare list format(%fmt) seed(integer) reps(integer) save(filename)]
  description: 'grqreg graphs the coefficients of a quantile regression (Koenker and

    Basset, 1978). It also has the option to graph the confidence interval, the OLS
    coefficient

    and the OLS confidence interval on the same graph.

    grqreg rewards the use of variable labels. The variable labels are

    used in the graphs, providing more intelligible variable descriptions than 8-letter

    names. If no variable label is available grqreg uses the variable names.

    grqreg works after qreg, bsqreg and sqreg.

    grqreg is an rclass program.'
  options:
  - varlist Select variables that will be graphed. Default value are all the estimated
    coefficients except the intercept.
  - qmin sets the minimum value for the quantile. Default value .05.
  - qmax sets the maximum value for the quantile. Default value .95.
  - qstep sets the quantile increments. Default value .05.
  - 'quantile estimate # quantiles; this is a default option after running sqreg.
    When using this option please use the same number format for all quantiles (i.e.
    .25 .50 .75 or .251 .503 .752) and not (05 515 750).'
  - level sets the level of the confidence interval. Default value the same used in
    the original regression.
  - cons plots the intercept. Default off.
  - ci graph confidence interval of Quantile Regression. Default off.
  - ols graph OLS estimate. Default off.
  - list
  - olsci graph OLS confidence interval of the OLS regression. Default off.
  - compare graphs two coefficients of a quantile regression. Only supports two variables
    at the time. The first variable is ploted on the y-axis and the second variable
    on the x-axis. Default off.
  - title Allow user to assing individual title names for each one of the figures.
    Please note that no spaces are allowed between the name of the same figure (i.e.
    Fig1a Fig1b ... Fig1z).
  - seed(integer). Set seed value.
  - reps(integer). Default value 20.
  - format(%fmt). Default value %9.2f. For more information please see format.
  - save Allow user to create a new dataset with the point estimates used to generate
    the graphs. The replace option is permanently enabled.
  - dydx specifies that marginal effects be calculated. It is the default.
  - eyex specifies that elasticities be calculated in the form d(lny)/d(lnx)
  - dyex specifies that elasticities be calculated in the form d(y)/d(lnx)
  - eydx specifies that elasticities be calculated in the form d(lny)/d(x)
  examples: []
  stored_results: []
  references:
  - 'Chernozhukov, V. (2000) Conditional Extremes and Near-Extremes. MIT Dept. of
    Economics Working Paper No. 01-21. http://ssrn.com/abstract=272836 Koenker, R.
    and G. Basset (1978) "Regression Quantiles." Econometrica, 46(1): 33-50. Koenker,
    R. and G. Basset (1982) "Robust test for heteroscedasticity based on regression
    quantiles." Econometrica, 50(1): 43-61. Koenker, R. and K. F. Hallock (2001) "Quantile
    Regression." Journal of Economic Perspectives, 15(4): 143-156. Koenker, R. and
    Geling, O. (2001) Reappraising medfly longevity: a quantile regression survival
    analysis. Journal of the American Statistical Association , 96: 458-468. Rogers,
    W. H. (1993) "Calculation of quantile regression standard errors." Stata Technical
    Bulltin, 3: 77-78.'
  authors:
  - Joao Pedro Azevedo
  - jazevedo@worldbank.org
  acknowledgements: ''
  also_see:
  - 'Manual: [R] qreg bsqreg sqreg mfx Online: help for qreg bsqreg sqreg mfx'
  version: 'version: 2.1'
  other_graph_the_coefficients_of_a_quantile_regression: grqreg [varlist] [weight]
    [, qmin(integer) qmax(integer) qstep(integer) quantiles(#[#[# ...]]) level(confidence
    interval) title(title list) mfx(type) cons ci ols olsci compare list format(%fmt)
    seed(integer) reps(integer) save(filename)] fweights and aweights are allowed
    after qreg; see help weights. See help weight.
  other_standard_errors: 'grqreg uses the standard errors generated by the qreg, bsqreg
    and sqreg commands. qreg estimates the variance-covariance matrix of coefficients
    using a method of Kroenker and Basset (1982) and Rogers (1993). This is described
    in Methods and Formulas from the Stata Manual. sqreg obtains an estiamte of the
    variance-covariance matrix via bootstraping and the variance-covariance matrix
    includes between quantile blocks. bsqreg obtains an estiamte of the variance-covariance
    matrix via bootstraping with one quantile. Please notice that: -bsqreg- and -sqreg-
    have different standard errors (same initial seed and quantile) because the two
    commands use different methods to generate bootstrap sample. Both commands calculate
    the bootstrap standard errors manually instead of using the official -bootstrap-
    prefix command. The -bsqreg- command uses -bsample- to take each of the bootstrap
    samples. You can type for details on this command. On the other hand, -sqreg-
    uses the undocumented -bsampl_w- command. You can type to see the code and more
    information on this command. Here, you will see that this is logically equivalent
    to -bsample-, but because they use different algorithms, they will not create
    the same bootstrap sample when used with the same seed.'
  remarks: For extreme quantiles it is not recomended to push tau (qstep) into the
    tails (qmin and qmax) too far especially when there are a large number of parameters
    being estimated. The crucial element is the existence of enough observations above
    and below to make it plausible that the fit isn't just an artifact of a few extreme
    observations. The asymptotics rely on there being enough observations on both
    sides in order to get a conditional central limit theorem (CLT) effect from the
    gradient. A rough rule of thumb would be that min should be 10p where p is the
    number of parameters being estimated. So if you have p = 5, n=5000 then tau shouldn't
    be smaller than .01. For more details on this remark please refer to Koenker and
    Eboil (2001) and Chernozhukov (2000).
  other_aknowledgements: This ado uses part of the code written by Michael Blasnik
    (qregtrace). I would also like to thank Jeffrey T Grogger, Scott Merryman, Martin
    Weiss, Getúlio Borges, James Hassell and Nick Cox for their valuable suggestions.
    Many thanks to Joy Wang for the clarifications regarding the bootstrap procedures
    of bsqreg and sqreg. The usual disclaimer applies.
  help_file_type: hlp
hoi:
  title: hoi
  short_description: Human Opportunity Index
  syntax: ''
  description: 'hoi computes the Human Opportunity Index proposed by Barros et al
    (2008), including the Coverage

    of Basic Opportunities (C), the Dissemilarity Index (D), and the Human Opportunity
    Index (HOI). Analytical standard errors

    are reported for the C, D, and HOI. The program also computes two decompositions
    of changes of the HOI: (i) the scale and distribution decomposition

    Barros et al (2008); and, (ii) the composition, equalization and scale decomposition
    presented in (Molinas et al, 2010 and Velez et al, 2010).

    If the by option is specified the command will automatically produce a counterfactual
    using the coefficients from an alternative period in time or palce.

    If the coverage rate of a selected outcome is equal to 100 or 0, hoi will produce
    the respective HOI withough

    relying on the logit.'
  options:
  - by(groupvar) repeats the command for the two groups of observations for which
    the values of the variables in varlist are the same. Groupvar must be an integer
    variable with labels.
  - base(refcat) sets the value of the comparation categoric group that defided the
    base group. If the base category was not defined hoi will use the first category.
  - format specify the display format for variables. Default format %9.3f.
  - estimates shows the coefficients of the logit model used on the calculation of
    the index.
  - level sets the level of the confidence interval. Default value 95%.
  - 'adjust1([var[= #] ...]) provides the specifications of the first adjusted predictions.
    The estimate is computed for each variables, setting the variables specified in
    [var[= #] ...] to their mean or to the specified number if the = # part is specified.
    Variables used for the estimation but not included in adjust variable list are
    left at their current values, observation by observation.'
  - keep preserve the predicted values used in the computation of the index.
  - nose omit the standard errors and respective confidence intervals.
  - 'coef(string) this option allows to choice of the coeeficients used in the estimation
    of the HOI. Three options are allowed: all - uses the cofficient the full sample
    will be used; value of by - analysist can also chose a particular reference category
    by selecting a specific value of the by variable, to be used in all estimations
    of the index; blank - the default option is to estimate a seperate logit of each
    category of the by variable.'
  - decomp1 reports the scale and distribution decomposition (Paes de Barros et al,
    2008). If not specifically determined through the base option, the first category
    in the list is used as reference.
  - decomp2 reports the composition, equalization and scale decomposition (Molinas
    et al, 2010). If not specifically determined through the base option, the first
    category in the list is used as reference. It is important to note that the scale
    effect reported in decomp2 is not the same as the scale effect reported in decomp1.
  - 'mixcoef(string) this option allows one to chose the coefficient from which population
    will be used on the composition, equalization and scale decomposition (decomp2).
    Three options are allowed: all - uses the cofficient a pooled regression; value
    of by - analysist can also chose a particular reference category by selecting
    a specific value of the by variable, to be used in all estimations of the index;
    blank - the default option is to estimate a seperate logit of each category of
    the by variable.'
  - simple reports only the C, D, and HOI. Omits summary statistics regarding the
    logit, dataset used and information lost, and the share of the vulnerable population.
  - nowarning omitts warning messages.
  - asis forces retention of perfect predictor variables and their associated perfectly
    predicted observations and may produce instabilities in maximization; see .
  examples:
  - . hoi agua id13 id14 id15 id16 sexo educac educac2 lrdpc casal scr area [fw=peso],
    adjust1(id13=1 id14=0 id15=0 id16=0) format(%9.3f)
  - . hoi agua id13 id14 id15 id16 sexo educac educac2 lrdpc casal scr area [fw=peso],
    if idade >= 10 & idade <= 14 adjust1(id13=1 id14=0 id15=0 id16=0) format(%9.3f)
  - . hoi agua id13 id14 id15 id16 sexo educac educac2 lrdpc casal scr area [fw=peso],
    if idade >= 10 & idade <= 14 adjust1(id13=1 id14=0 id15=0 id16=0) format(%9.3f)
    estimates
  - . hoi agua id13 id14 id15 id16 sexo educac educac2 lrdpc casal scr area [fw=peso],
    format(%9.3f) adjust1(id13=1 id14=0 id15=0 id16=0) by(subregion)
  - . hoi agua id13 id14 id15 id16 sexo educac educac2 lrdpc casal scr area [fw=peso],
    if idade >= 10 & idade <= 14 adjust1(id13=1 id14=0 id15=0 id16=0) by(subregion)
    simple
  - '. bootstrap hoi=r(hoi_1): hoi agua id13 id14 id15 id16 sexo educac educac2 lrdpc
    casal scr area, if idade >= 10 & idade <= 14 adjust1(id13=1 id14=0 id15=0 id16=0)
    simple'
  stored_results:
  - hoi return results in r() format. Type return list after estimation.
  references:
  - 'Carlos Eduardo Velez, Joao Pedro Azevedo, and Christian Posso. Oportunidades
    para los niños colombianos: cuánto avanzamos en esta década. Banco Mundial, Bando
    de la Republica, Departamento Nacional de Planeacion: Bogota, Colombia. http://go.worldbank.org/KNSYMOAU10
    Jose Molinas Vega, Ricardo Paes de Barros, Jaime Saavedra Chanduvi, et all, 2010.
    "Do Our Children Have a Chance? The 2010 Human Opportunity Report for Latin America
    and the Caribbean - Conference Edition", World Bank: Washington, DC. http://www.worldbank.org/lacopportunity/
    Ricardo Paes de Barros, Francisco H.G. Ferreira, Jose Molinas Vega, Jaime Saavedra
    Chanduvi, et all, 2008. "Measuring Inequality of Opportunities in Latin America
    and the Caribbean", World Bank: Washington, DC. http://go.worldbank.org/A9Z0NUV620'
  authors:
  - Joao Pedro Azevedo
  - jazevedo@worldbank.org
  - Samuel Franco
  - Eliana Rubiano
  - Alejandro Hoyos
  acknowledgements: 'Numerous people have provided feedback and advice and the author''s
    are very grateful for their comments. In

    particular we''d like to thank: Jose R. Molinas Vega, Jaime Saavedra, Ricardo
    Paes de Barros, Carolina Diaz-Bonilla,

    Samuel Freije-Rodriguez, Georgina Pizzolitto, Amer Hassan, and Christian Manuel
    Posso Suárez. The usual disclaimer

    applies.'
  also_see: []
  version: ''
  other_output: Converage (C) Coverage of Basic Opportunities Dissemilarity (D) Dissemilarity
    Index Human Opportunity Index (HOI) Human Opportunity Index Pseudo R2 from the
    logit model Obs Logit number of observations used in the logit model Obs number
    of observations of the dependent variable Wtg Pop weighted population Vulnerable
    Pop number of vulnerable populations (pi <= pBar) Vulnerable (%) share of vulnerable
    population Obs 1 number of observations used in the logit model Obs 2 number of
    observations of the dependet variable Loss (%) share of observations loss given
    the set of circunstances
  citation: 'J.P. Azevedo, S. Franco, E. Rubiano, A. Hoyos, 2010. "HOI: Stata module
    to compute Human Opportunity Index," Statistical Software Components S457191,
    Boston College Department of Economics.http://ideas.repec.org/c/boc/bocode/s457191.html.
    This version INSERT_VERSION_HERE. where you can check your version as follows:'
  remarks: Please note that hoi uses the user written packages indeplist from Maarten
    L. Buis, and _pecats produced by J. Scott Long and Jeremy Freese on its calculations.
    User's can download them from ssc.
  help_file_type: hlp
mol:
  title: mol
  short_description: Measures of Effective Literacy
  syntax: mol varlist [weight] [if exp] [in range] , house(varname) [ f:ormat(%fmt)
    by(varname) rank gen ] aweights and fweights are allowed; see help weights.
  description: 'A country''s overall level of literacy is usually measured by taking
    the number

    of adults who are literate as a percentage of the total number of adults - the

    so-called literacy rate. Following Sen (1985) there has been increased use of
    the

    literacy rate and other social indicators to evaluate the overall standard of

    living in a country.

    mol implements an alternative aproaches to evaluate the aggregate literacy level

    in a country or region or any type of group. The resulting ''effective literacy''
    proposed by

    Basu and Foster (1998). This measure takes into account the intrahousehold externality
    arising

    from the presence of a literate member in the household. The extensions proposed
    by

    Subramanian (2004) are also implemented.'
  options: []
  examples:
  - . mol alfab [fw= weight], house(domicilio)
  - . mol alfab [fw= weight], house(domicilio) alpha(.2 .5 .8)
  - . mol alfab [fw= weight], house(domicilio) by(region) gen
  - . mol alfab [fw= weight], house(domicilio) by(state) rank
  - . mol alfab [fw= weight], house(domicilio) by(gender) alpha(.2)
  - . mol alfab [fw= weight], house(domicilio) by(gender) alpha(.2 .5 .8)
  stored_results:
  - mol returns results in r() format.
  references:
  - 'Basu, Kaushik and Foster, James E. (1998) On measuring literacy. Economic Journal,
    vol.108, no.451, Nov., pp.1733-1749. Sen, A. (1985), Commodities and Capability.
    Amsterdam: North-Holland. Subramanian, S (2004) Measuring literacy: some extensions
    of the Basu-Foster framework. Journal of Development Economics, vol.73, pp453-463.'
  authors:
  - Joao Pedro Azevedo
  - jazevedo@worldbank.org
  - World Bank
  acknowledgements: 'The financial support of UNESCO is gratefully acknowledge.


    The usual disclaimer applies.'
  also_see:
  - 'Manual: [R] lorenz Online: help for alorenz; apoverty; changemean (if installed).'
  version: ''
  other_measures_of_effective_literacy: mol varlist [weight] [if exp] [in range] ,
    house(varname) [ f:ormat(%fmt) by(varname) rank gen ] aweights and fweights are
    allowed; see help weights.
  other_option: by(housevar) indicates the variable that will be used to identify
    the members of a given household. by(groupvar) repeats the command for each group
    of observations for which the values of the variables in varlist are the same.
    Groupvar must be an integer variable. alpha(number) specifies the sensitivity
    alpha used. Alpha is contained within the interval [0,1]. If alpha is omited,
    only the houseshould effective literacy is calculated. Multiple alphas are allowed
    to be calculated at once. rank returns the rank of different groups according
    to each indicator. gen generates tree new variables in the dataset with the output
    of the exercise. format(%fmt) specifies the format to be used to display the estimated
    inequality indices. The default is to use a %6.5f format.
  other_output_variables: "R : 'Crude' Literacy Rate . Re : Effective Literacy [alpha\
    \ = hous. lit. rate]. (1-I): Isolated Rate of Literacy (1-I). I : Isolated Rate\
    \ of Illiteracy (1-I). Q : Efficiency Loss. Q is contained within the interval\
    \ [0,1]: Q= 0 when I = 0, and Q= 1 when I=1\x06R (which, of course, is the maximum\
    \ value I can attain, corresponding to a situation in which all illiterates are\
    \ isolated illiterates). R* : Externality-adjusted Literacy Rate (Subramanian,\
    \ 2004)."
  help_file_type: hlp
turnbull:
  title: turnbull
  short_description: Turnbull Nonparametric Estimator for Williness to Pay
  syntax: turnbull where bid is the variable that reports the bid value offered to
    the respondent. t is the variable that indicates if the repondent would like to
    contribute to the project at the price offered (T =1 if WTP>AMOUNT).
  description: 'turnbull estimates the Turnbull empirical distribution estimator of
    willingness to

    pay proposed by Carson et al (1994a,b). Haab and McConnell (1997) argue that this
    estimator solves the

    problem of estimating negative willingness to pay without resorting to ad hoc
    distribution assumptions, and show

    that central tendency measures of willingness to pay from parametric models are
    sensitive to the assumed distribution,

    while the lower bound Turnbull estimate is robust accross distributions.'
  options: []
  examples:
  - . use ferry dataset (http://www-sekon.slu.se/~bkr/)
  - . turnbull bid t
  - . turnbull bid t, short
  stored_results: []
  references:
  - "Azevedo, Joao Pedro. What is the Value of Educational Broadcast? (February 2009).\
    \ Available at SSRN: http://ssrn.com/abstract=1332786. Carson, R. T., W. M. Hanemann,\
    \ R. J. Kopp, J. A. Krosnick, R. C. Mitchell, S. Presser, P. A. Ruud, and V. K.\
    \ Smith (1994a) \x91\x91Prospective Interim Lost Use Value Due to DDT and PCB\
    \ Contamination in the Southern California Bight,\x92\x92 NOAA Contract No.-DGNC-1-00007.\
    \ Carson, R. T., L. Wilks, and D. Imber (1994b). Valuing the preservation of Australia\x92\
    s Kakadu Conservation Zone, Oxford Econom. Papers 46, 727-749. Haab, T. and K.\
    \ McConnell (1997). Referendum Models and Negative Willingness to Pay: Alternative\
    \ Solutions. Journal of Environmental Economics and Management 32(2), 251-270."
  authors:
  - Joao Pedro Azevedo
  - jazevedo@worldbank.org
  acknowledgements: ''
  also_see:
  - spike if installed.
  version: ''
  other_turnbull_nonparametric_estimator_for_williness_to_pay: turnbull where bid
    is the variable that reports the bid value offered to the respondent. t is the
    variable that indicates if the repondent would like to contribute to the project
    at the price offered (T =1 if WTP>AMOUNT).
  help_file_type: hlp
spike:
  title: spike
  short_description: Spike model for Williness to Pay
  syntax: spike where s is the variable that indicates if the respondent would like
    to contribute at all to the project (S =1 if WTP>0). t is the variable that indicates
    if the repondent would like to contribute to the project at the price offered
    (T =1 if WTP>AMOUNT). bid is the variable that reports the bid value offered to
    the respondent.
  description: 'spike command allows for a non-zero probability of zero willingness-to-pay

    in referendum-style contingent valuation experiments as suggested by Kristrom
    (1997). This property is particular usefull in experiments in which

    a large fraction of the population chose not to consume good being offered. In
    such circunstances the use of traditional

    parametric models based on probit and logit models are likelly to predict a negative
    willingness-to-pay.'
  options: []
  examples:
  - . use ferry dataset (http://www-sekon.slu.se/~bkr/)
  - . spike s t bid
  stored_results: []
  references:
  - 'Azevedo, Joao Pedro. What is the Value of Educational Broadcast? (February 2009).
    Available at SSRN: http://ssrn.com/abstract=1332786. Kristrom, B. (1997). Spike
    Models in Contingent Valuation. American Journal of Agricultural Economics 79(3),
    1013-1023.'
  authors:
  - Joao Pedro Azevedo
  - jazevedo@worldbank.org
  acknowledgements: ''
