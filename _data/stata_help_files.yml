factortest:
  title: factortest
  short_description: Calculate specification tests before factor or pca
  syntax: ''
  description: 'factortest performs the Bartlett''s test for sphericity and

    the Kaiser-Meyer-Olkin Measure of Sampling Adequacy. Both tests should be used

    prior to a factor or a principal component analysis.'
  options: []
  examples:
  - . factortest price mpg rep78 rep77 hdroom rseat trunk
  stored_results: []
  references:
  - 'Box,G.E.P.(1949) "A general distribution theory for a class of likelihood criteria."
    Biometrica, 36: 317-346. Cureton, E.E., & D''Agostino, R.B. (1983). Factor analysis:
    An applied approach. Hillsdale, NJ: Erlbaum.'
  authors:
  - Joao Pedro Azevedo, IPEA, Brazil
  - jazevedo@ipea.gov.br
  acknowledgements: ''
  also_see:
  - 'Manual: [R] factor [R] pca [R] alpha Online: help for factor; pca; alpha'
  version: ''
  other_technical_details: 'Determinant of the matrix of correlation: This determinant
    will equal 1.0 only if all correlations equal 0, otherwise the determinant will
    be less than 1. Bartlett''s test for sphericity: Calculates the determinant of
    the matrix of the sums of products and cross-products (S) from which the intercorrelations
    matrix is derived. The determinant of the matrix S is converted to a chi-square
    statistic and tested for significance. The null hypothesis is that the intercorrelation
    matrix comes from a population in which the variables are noncollinear (i.e. an
    identity matrix), and that the non-zero correlations in the sample matrix are
    due to sampling error. Kaiser-Meyer-Olkin Measure of Sampling Adequacy: is an
    index for comparing the magnitudes of the observed correlation coefficients to
    the magnitudes of the partial correlation coefficients. Large values for the KMO
    measure indicate that a factor analysis of the variables is a good idea. 90 or
    above, excelent 80 or above, meritorious 70 or above, middling 60 or above, mediocre
    50 or above, miserable; and below .50, unacceptable.'
  other_aknowledgements: I would like to thank May M. Boggess for her help and Roberto
    De Miguel for his suggestions.
  help_file_type: hlp
crtest:
  title: crtest
  short_description: Cramer-Ridder Test for pooling states in a Multinomial Logit
  syntax: ''
  description: 'crtest performs the Cramer-Ridder test for pooling states in the

    Multinomial logit model.'
  options: []
  examples:
  - .mlogit occup1 female under35 married2
  - .crtest
  stored_results: []
  references:
  - 'Cramer,J.S. and G.Ridder (1991) "Pooling states in multinomial logit model."
    Journal of Econometrics, 47: 267-272.'
  authors:
  - Joao Pedro W. de Azevedo, University of Newcastle, UK
  - j.p.azevedo@ncl.ac.uk
  acknowledgements: ''
  also_see:
  - 'Manual: [R] mlogit Online: help for mlogtest; iia; smhsiao (if installed)'
  version: ''
  other_technical_details: 'This test assume a multinomial logit model with (S+1)
    states and two states that are candidates for pooling, s1 and s2. The null hypothesis
    is that s1 and s2 have the same regressors coefficient apart from the intercept,
    or Bs1 = Bs2 = Bs (1) To test this hypothesis the following test statistics can
    be used: LR = 2 (2) where lnL is the maximum log likelihood of the original model
    and lnLr the maximum log likelihood if the estimates are constrained to satisfy
    (1). LR asymptotically has a chi-square distribution with k degrees of freedom
    where k is the number of restrictions implied by (1). LnL is readily available
    from the original model, but the lnLr apparently requires constrained estimation
    which can be quite laborious. Cramer and Ridder (1991) show that the lnLr can
    be easily derived from an unconstrained estimation of the pooled model with only
    S states. The following expression to estimate the restricted maximum log likelihood
    is then presented by the authors, lnLr = ns1*ln(ns1) + ns2*ln(ns2) - ns*ln(ns)
    + lnLp where lnLp is the unconstrained maximum of the log likelihood of the pooled
    model. ns1 and ns2 are the number of observations on the states s1 and s2, respectively,
    and ns = ns1 + ns2.'
  other_aknowledgements: This ado file uses the auxiliary ado file _pecats written
    by J. Scott Long and Jeremy Freese. I would like to thank Brian Poi, Christopher
    Baum and Nick Cox for their helpfull suggestions. As usual, all mistakes are of
    my own responsibility.
  help_file_type: hlp
groupfunction:
  title: groupfunction
  short_description: ''
  syntax: groupfunction [if] [in] [aw pw fw] , by(varlist) mean(varlist) sum(varlist)
    rawsum(varlist) first(varlist) min(varlist) max(varlist) count(varlist) sd(varlist)
    variance(varlist) gini(varlist) theil(varlist) xtile(varlist) nq(int) missing
    norestore
  description: groupfunction Replaces several collapse functions (mean, sum, variance,
    first, max, min). The command is several orders of magnitude faster than collapse
  options:
  - by(varlist) Grouping for reporting estimates.
  - xtile(varlist) Coupled with nq(), it creates variable with percentiles and adds
    it to the by() option.
  - nq(int) Option only works when xtile() is specified. It indicates the number of
    quantiles.
  - mean(varlist) Calculates means of specified variables.
  - sum(varlist) Calculates total sum of specified variables. If weights are specified
    it will give population expanded total.
  - rawsum(varlist) Calculates total sum of specified variables. If weights are specified
    it will ignore weights.
  - first(varlist) Provides first observation by groups specified in by option.
  - min(varlist) Provides minimum value, by groups, of vectors specified.
  - max(varlist) Provides maximum value, by groups, of vectors specified.
  - count(varlist) Provides observation count, by groups, of vectors specified.
  - sd(varlist) Calculates standard deviations of specified variables.
  - variance(varlist) Calculates variance of specified variables.
  - gini(varlist) Calculates Gini coefficient of specified variables.
  - theil(varlist) Calculates Theil coefficient of specified variables.
  - missing This option is only relevant for sum and rawsum. If an entire group in
    by() is missing for the sum/rawsum variable the output will be missing instead
    of zero.
  - norestore Drops all non-relevant variables before calculations to improve memory
    management.
  - slow Use this option if you run into memory issues, it will get values one by
    one.
  - merge Requests that values are not to be collapsed, it instead merges the new
    vectors to the dataset in memory.
  examples:
  - clear all set more off set obs 300000 version 13 set seed 458267 gen regions =
    int(runiform()*20) replace region = 1 if inrange(region,0,3) replace region =
    2 if inrange(region,4,5) //Income per capita forval z=1/200{ gen x_`z' = region*runiform()*4000
    + rnormal()*200 } forval z=1/300{ gen y`z' = runiform()*100 + (rnormal()*20)^2
    } gen weight = abs(rnormal()) //time collapse preserve timer on 1 collapse (mean)
    y* x_* [aw=w], by(region) timer off 1 restore //time fcollapse (Weights not supported)
    preserve timer on 2 fcollapse (mean) y* x_*, by(region) timer off 2 restore //time
    groupfunction preserve timer on 3 groupfunction [aw=weight], mean(y* x_*) by(region)
    timer off 3 restore timer list
  stored_results: []
  references: []
  authors:
  - Paul Corral
  - The World Bank - Poverty and Equity Global Practice
  - Washington, DC
  - pcorralrodas@worldbank.org
  - Minh C. Nguyen
  - The World Bank - Poverty and Equity Global Practice
  - Washington, DC
  - pcorralrodas@worldbank.org
  - Joao Pedro Azevedo
  - The World Bank - Poverty and Equity Global Practice
  - Washington, DC
  - jazevedo@worldbank.org
  - Raul AndrÃ©s CastaÃ±eda provided valuable suggestions for this command.
  acknowledgements: ''
  also_see: []
  version: ''
  other_title: '... Replaces several basic collapse functions (mean, sum, variance,
    standard deviation, first, max, min). The command is several orders of magnitude
    faster than collapse when summarizing multiple vectors on larger datasets.} ...'
  help_file_type: sthlp
outtable:
  title: outtable
  short_description: Output matrix to LaTeX table
  syntax: outtable using filename , mat(matrixname) [ r:eplace app:end nobox c:enter
    cap:tion("Caption") f:ormat(formatlist) norow:lab nodots longtable label clabel(string)]
    This command makes use of the file command, added to Stata on 8 May 2001. If file
    is not recognized, update query.
  description: 'outtable automates the conversion of a Stata matrix to a LaTeX table,
    written to an

    external file. The table is presented with row and column names taken from the
    specified matrix.

    Thus, one need only generate the appropriate matrix

    using standard Stata commands. By default, only the lower triangle of a symmetric
    matrix will

    be written, as inferred by Stata''s issym() function.

    The using clause is required, and must specify the name of a file to which the
    LaTeX

    table is to be written, without the .tex extension. If the file exists, either
    the

    replace option or the append option must be specified.

    The mat qualifier specifies the name of the existing matrix which is to be written
    in

    tabular form.'
  options:
  - replace specifies that if filename exists, it should be overwritten with the contents
    of mat.
  - append specifies that output should be appended to an existing filename. It may
    be used even if the file has not been previously created.
  - nobox specifies that the default behavior of providing borders for each cell of
    the table should not be applied.
  - center specifies that elements in the second and following columns of the table
    should be centered, rather than flush left.
  - asis specifies that the row and column names of mat should be passed through to
    the TeX file without alteration. This permits use of the underscore (_) to create
    subscripts in row or column headings. However, if the names of regressors are
    being used as labels, the default label _cons should be changed.
  - caption specifies a caption to be produced above the table. The table will be
    automatically numbered according to the style of the document.
  - formatlist specifies the format to be applied to the elements in the body of the
    table, which will then override the default format used to display matrix elements.
    If one value is specified, all columns are output with that format. If more than
    one space-delimited format is listed, they are mapped 1-to-1 to the columns of
    the matrix.
  - norowlab suppresses the row labels.
  - nodots specifies that missing numeric values should be represented as empty cells
    rather than ".".
  - longtable option allows to create tables that span over several pages using the
    "longtable" package (do not forget to \usepackage in the preamble of your .tex
    document)
  - label option allows to display variable labels (if they exist) instead of variable
    names.
  - clabel allows you to enter the \caption information which is used by LaTeX for
    cross-referencing tables. This option may be omitted and later typed into your
    LaTeX document.
  examples:
  - . use auto
  - . forv r=2/5
  - . qui reg price headroom-turn if rep78==`r'
  - . mat c`r'=e(b)'
  - . }
  - . mat c=c2,c3,c4,c5
  - . mat colnames c=rep78_2 rep78_3 rep78_4 rep78_5
  - . outtable using cars,mat(c) replace
  - . outtable using cars,mat(c) append center f(%9.2f)
  - . outtable using cars,mat(c) replace center f(%9.2f %9.3f %9.1f %9.2f)
  - . outtable using cars,mat(c) replace c
  - cap("Regression coefficients by rep78")
  stored_results: []
  references: []
  authors:
  - Christopher F Baum, Boston College
  - baum@bc.edu
  - Joao Pedro Azevedo, Instituto de Pesquisa Economica Aplicada, Rio de Janeiro,
    Brazil
  - jazevedo@ipea.gov.br
  acknowledgements: 'This command was made possible by Bill Gould''s implementation
    of the file command,

    and inspired by conversations with Petia Petrova. Suggestions from David Drukker,

    Alan Feiveson and Nicholas J. Cox have improved its functionality. Formatting
    code was

    borrowed from Blasnik and Jann''s mat2txt.'
  also_see:
  - 'On-line: help for file, outseries (if installed), tosql (if installed)'
  version: ''
  other_output_matrix_to_latex_table: outtable using filename , mat(matrixname) [
    r:eplace app:end nobox c:enter cap:tion("Caption") f:ormat(formatlist) norow:lab
    nodots longtable label clabel(string)] This command makes use of the file command,
    added to Stata on 8 May 2001. If file is not recognized, update query.
  help_file_type: hlp
dfl:
  title: dfl
  short_description: DiNardo, Fortin and Lemieux Counterfacual Kernel Density
  syntax: dfl depvar indepvars [if exp] [in range] , outcome(varname) [group(varname)
    min(integer) max(integer) nbins(integer) w(bandwidth) step(varlist) adaptive gauss
    epan oaxaca quietly probit nxvar(string) ncfactual(string) nufactual(string) nfactual(string)
    graph_combine axis_selection_options axis_scale_options title_options nogroupt
    name3(string)]
  description: 'dfl estimates DiNardo, Fortin and Lemieux Counterfacual Kernel Densities.

    Treatment status is identified by depvar==1 for the treated and depvar==0

    for the untreated observations.

    The propensity score - the conditional treatment probability - is estimated by

    the program on the indepvars.

    outcome variable has to be specified.

    dfl also support graph options such as graph_combine, title_options and

    axis_selection_options.

    Several different weight can be used on this procedure. In this ado we use the
    following weight.

    Weight=1-Prob(Depvar=1)/Prob(Depvar=0).'
  options:
  - group the group variable.
  - graph cfactual (compares the (Depvar=0) distribution to the (Depvar=0) distribution
    that would have prevailed if they had been paid like (Depvar=1)) , ufactual (compares
    the (Depvar=1) distribution to the counterfactual. These will be different to
    the extent that the X's of the two groups differ) and diff (difference between
    the how (Depvar=0) distribution that would have prevailed if they had been paid
    like (Depvar=1) and (Depvar=1) distribution).
  - min sets the minimum value. When omited dfl uses the minimum value of the specified
    outcome.
  - max sets the maximum value. When omited dfl uses the maximum value of the specified
    outcome.
  - nbins number of equaly spaced intervals.Default value 200.
  - adaptive produces density estimates using adaptive kernel estimation methods.
    Please note that the method is slower than than the default one.
  - step Sequential decomposition. This option runs N+1 models (N being the number
    of variables in the varlist). The first model will consider all variables. Each
    subsequent model will remove one variable at the time. The final output is a single
    graph with overlaying kernel density differences for the N+1 models. My impression
    is that if N>2 the figure gets very clutered.
  - gauss specify the kernel (gaussian).
  - epan specify the kernel (epanechnikov).
  - oaxaca compute mean using the estimated density to and compare to the actual mean
    of log wages or oaxaca wages (the predicted values).
  - quietly do not print output of propensity score estimation.
  - probit use probit instead of the default logit to estimate the propensity score.
  - nxvar assign a label to the x-axis.
  - ncfactual assign a label to cfactual.
  - nfactual assign a label to factual.
  - nufactual assing a label to ufactual.
  - nogroupt drops the group names from the figure.
  examples: []
  stored_results: []
  references:
  - 'DiNardo, J., N.M. Fortin, and T.Lemieux (1996) "Labour Market Insitutions and
    the Distribution of Wages, 1973-1992: A Semiparametric Approach," Econometrica,
    64(5): 1001-1044. Van Kerm, P. (2003) "Adaptive kernel density estimation."The
    Stata Journal , 3(2): 148-156.'
  authors:
  - Joao Pedro Azevedo, World Bank, jazevedo@worldbank.org
  acknowledgements: ''
  also_see:
  - 'Manual: [R] kdensity Online: help for kdensity and help for akdensity and decompose
    and jmp if installed.'
  version: ''
  other_dinardo__fortin_and_lemieux_counterfacual_kernel_density: dfl depvar indepvars
    [if exp] [in range] , outcome(varname) [group(varname) min(integer) max(integer)
    nbins(integer) w(bandwidth) step(varlist) adaptive gauss epan oaxaca quietly probit
    nxvar(string) ncfactual(string) nufactual(string) nfactual(string) graph_combine
    axis_selection_options axis_scale_options title_options nogroupt name3(string)]
  other_aknowledgements: This ado uses part of the code written by John DiNardo. I
    would like to thank some Stata users who have made comments to an earlier release
    of this ado, in particular Jean Ries. The usual disclaimer applies.
  help_file_type: hlp
