wbopendata:
  title: wbopendata
  short_description: ''
  syntax: 'wbopendata, Parameters [Options] ... country(acronym): list of country
    code (accepts multiples) (and) topics(acronym): topic code (only accepts one)
    (or) indicator(acronym): list of indicator code(accepts multiples) ... long: imports
    the data in the long format. clear: replace data in memory. latest: keep only
    the latest available value of a single indicator. nometadata: omits the display
    of the metadata. year(date1:date2): time interval (in yearly, quarterly or monthly
    depending on the series). language(language): select the language. full: adds
    full list of country attributes. iso: adds 2 digits ISO codes to country attributes.
    update query: query the current vintage of indicators and country metadata available.
    update check: checks the availability of new indicators and country metadata available
    for download. update all: refreshes the indicators and country metadata information.
    match(varname): mergue country attributes using WDI countrycodes. projection:
    World Bank population estimates and projections (HPP) . metadataoffline: download
    all indicator metadata informaiton and generates 71 sthlp files in your local
    machine. wbopendata requires a connection to the internet and supports the Stata
    dialogue function (). ...'
  description: 'wbopendata allows Stata users to download over 17,000 indicators from
    the World Bank databases, including: Development

    Africa Development Indicators; Doing Business; Education Statistics; Enterprise
    Surveys; Global Development Finance;

    Gender Statistics; Health Nutrition and Population Statistics; International Development
    Association - Results Measurement System;

    Millennium Development Goals; World Development Indicators; Worldwide Governance
    Indicators; and LAC Equity Lab. These indicators include information

    from over 256 countries and regions, since 1960.

    Users can chose from one of three of the languages supported by the database (and
    Stata), namely, English, Spanish, or French.

    Five possible downloads options are currently supported:

    country: over 1,000 indicators for all selected years for a single country (WDI
    Catalogue).

    topics: WDI indicators within a specific topic, for all selected years and all
    countries (WDI Catalogue).

    indicator: all selected years for all countries for a single indicator (from any
    of the catalogues: 17,000+ series).

    indicator and country: all selected years for selected countries for a single
    indicator (from any of the catalogues: 17,000+ series).

    multiple indicator: all selected years for selected indicators separated by ;
    (from any of the catalogues: 17,000+ series).

    Users can also choose to have the data displayed in either the wide or long format
    (wide is the default option).

    Note that the reshape is the local machine, so it will require the appropriate
    amount of RAM to work properly.

    wbopendata draws from the main World Bank collections of development indicators,
    compiled from

    officially-recognized international sources. It presents the most current and
    accurate global development

    data available, and includes national, regional and global estimates.

    The access to this databases is made possible by the World Bank''s Open Data Initiative
    which provide

    open full access to http://data.worldbank.org/.

    (Go up to Sections Menu)

    Parameters

    country(string): Countries and Regions Abbreviations and acronyms. If solely specified,
    this option

    will return all the WDI indicators (1,076 series) for a single country or region
    (no multiple country selection allowed in

    this case). If this option is selected jointly with a specific indicator, the
    output is a series for a specific

    country or region, or multiple countries or region. When selecting multiple countries
    please use the three letters code, separated by

    a semicolon (;), with no spaces.

    topics(numlist): Topic List 21 topic lists are curently supported and include
    Agriculture & Rural Development;

    Aid Effectiveness; Economy & Growth; Education; Energy & Mining; Environment;
    Financial Sector; Health; Infrastructure; Social Protection & Labor;

    Poverty; Private Sector; Public Sector; Science & Technology; Social Development;
    Urban Development; Gender; Millenium development goals; Climate Change;

    External Debt; and, Trade (only one topic collection can be requested at the time).

    indicator(string): Indicators List list of indicator codes (All series). When
    selecting multiple

    indicators please use semicolon (;), to separate differenet indicatos.

    (Go up to Sections Menu)

    Options

    long: imports the data in the long format. The default option is to import the
    data in the wide format. It is important

    note that wbopendata uses Stata resources to reshape the variables, hence user
    has to make sure that Stata will have sufficient

    RAM to complete this operation.

    clear: replace data in memory.

    latest: keep only the latest available value of a single indicator (it only work
    if the data in the long format).

    nometadata: omits the display of the metadata information from the series. Metadata
    information is only available when downloading specific series (indicator option).
    The metadata available include information on the name of the series, the source,
    a detailed description

    of the indicator, and the organization responsible for compiling this indicator.

    year:(date1:date2): allow users to select a specific time interval. Date1=Initial
    date; Date2=Final date. For most indicators Date should be expressed in yearly
    format, however for specific series quartely and montly series will be supported.
    Please check data documentation

    at the World Bank Data website to identify which format is supported.

    language(option): three languages are supported: The default language is English.

    English: en

    Spanish: es

    French: fr

    full: adds full list of country attributes.

    iso: adds only 2 digits ISO codes to country attributes.

    update query: query the current vintage of indicators available and country metadata.

    update check: checks the availability of new indicators and country metadata available
    for download.

    update all: refreshes the indicators and country metadata information.

    match(varname): mergue country attributes using WDI countrycodes.

    projection: World Bank staff population projection estimates using the World Bank''s
    total population and age/sex distributions of the United Nations Population Division''s
    World Population Prospects: 2019 Revision.

    metadataoffline: refresh all metadata information, and generate a local copy of
    all indicators metadata organized by topics and source. This option creates 71
    new help files in your local machine with approximately 15mb of documentation.

    (Go up to Sections Menu)'
  options: []
  examples:
  - (Go up to Sections Menu)
  - . wbopendata, indicator(si.pov.dday; ny.gdp.pcap.pp.kd) clear long
  - . tempfile tmp
  - . wbopendata, language(en - English) indicator(it.cel.sets.p2) long clear latest
  - . sort countrycode
  - . save `tmp', replace
  - . sysuse world-d, clear
  - . merge countrycode using `tmp'
  - . sum year
  - . local avg = string(`r(mean)',"%16.1f")
  - '. spmap it_cel_sets_p2 using "world-c.dta", id(_ID) /// clnumber(20) fcolor(Reds2)
    ocolor(none ..) /// title("Mobile cellular subscriptions (per 100 people)", size(*1.2))
    /// legstyle(3) legend(ring(1) position(3)) /// note("Source: World Development
    Indicators (latest available year: `avg'') using /// Azevedo, J.P. (2011) wbopendata:
    Stata module to " "access World Bank databases, /// Statistical Software Components
    S457234 Boston College Department of Economics.", /// size(*.7)) (click to run)'
  - . wbopendata, indicator(si.pov.dday ) clear long
  - . drop if si_pov_dday == .
  - . sort countryname year
  - '. bysort countryname : gen diff_pov = (si_pov_dday-si_pov_dday[_n-1])/(year-year[_n-1])'
  - . encode region, gen(reg)
  - . encode countryname, gen(reg2)
  - '. alorenz diff_pov, gp points(100) fullview xdecrease markvar(reg2) /// ytitle("Change
    in Poverty (p.p.)") xtitle("Proportion of regional /// episodes of poverty reduction
    (%)") legend(off) title("Poverty Reduction") /// mlabelangle(45) legend(off) ///
    note("Source: World Development Indicators using Azevedo, J.P. (2011) /// wbopendata:
    Stata module to " "access World Bank databases, Statistical /// Software Components
    S457234 Boston College Department of Economics.", /// size(*.7)) (click to run)'
  - . wbopendata, indicator(si.pov.dday ) clear long
  - . drop if si_pov_dday == .
  - . sort countryname year
  - . keep if regionname == "Aggregates"
  - '. bysort countryname : gen diff_pov = (si_pov_dday-si_pov_dday[_n-1])/(year-year[_n-1])'
  - . gen baseline = si_pov_dday if year == 1990
  - . sort countryname baseline
  - '. bysort countryname : replace baseline = baseline[1] if baseline == .'
  - . gen mdg1 = baseline/2
  - . gen present = si_pov_dday if year == 2008
  - . sort countryname present
  - '. bysort countryname : replace present = present[1] if present == .'
  - . gen target = ((baseline-mdg1)/(2008-1990))*(2015-1990)
  - . sort countryname year
  - . gen angel45x = .
  - . gen angle45y = .
  - . replace angel45x = 0 in 1
  - . replace angle45y = 0 in 1
  - . replace angel45x = 80 in 2
  - . replace angle45y = 80 in 2
  - '. graph twoway /// (scatter present target if year == 2008, mlabel( countrycode))
    /// (line angle45y angel45x ), /// legend(off) xtitle("Target for 2008") ytitle(Present)
    /// title("MDG 1 - 1.9 USD") /// note("Source: World Development Indicators (latest
    available year: 2008) /// using Azevedo, J.P. (2011) wbopendata: Stata module
    to " "access /// World Bank databases, Statistical Software Components S457234
    Boston /// College Department of Economics.", size(*.7)) (click to run)'
  - . wbopendata, indicator(si.pov.dday; ny.gdp.pcap.pp.kd) clear long latest
  - '. graph twoway /// (scatter si_pov_dday ny_gdp_pcap_pp_kd, msize(*.6)) /// (scatter
    si_pov_dday ny_gdp_pcap_pp_kd if region == "Aggregates", msize(*.8) /// mlabel(countryname)
    mlabsize(*.8) mlabangle(25)) /// (lowess si_pov_dday ny_gdp_pcap_pp_kd) , ///
    xtitle("GDP per capita, PPP (constant 2011 international $)") /// ytitle("Poverty
    headcount ratio at the International Poverty Line") /// mlabelangle(45) legend(off)
    /// note("Source: World Development Indicators (latest available year as off 2012-08-08)
    /// using Azevedo, J.P. (2011) wbopendata: Stata module to " "access World Bank
    databases, /// Statistical Software Components S457234 Boston College Department
    of Economics.", /// size(*.7)) (click to run)'
  - '...'
  stored_results: []
  references:
  - '(Go up to Sections Menu) David C. Elliott, 2002. "TKNZ: Stata module to tokenize
    string into named macros," Statistical Software Components S426302, Boston College
