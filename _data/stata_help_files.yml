    the authors’ responsibility alone.
  help_file_type: sthlp
alorenz:
  title: alorenz
  short_description: Derivation of the Pen's Parade, Lorenz and Generalised Lorenz
    curve from the empirical distribution
  syntax: alorenz depvar [if exp] [in range] [weight] [ , points(number) by(varname)
    order(varname) gl gp ge gom goa angle45 format(string) output(string) view fullview
    compare base(refcat) grname(string) results(string) select(string) mlabangle(string)
    mlabsize(string) mark(value 1 ... value n) marklabel(valuelabel 1...valuelabel
    n) markvar(varname (categorical)) invert xdecrease ksmirnov exact noisily ]
  description: 'alorenz derive and plot the Pen''s Parade, Lorenz and Generalized
    Lorenz curve from the empirical distribution. In addition, alorenz allow user

    to retrive the data used to generate the curves, and implement first order stochastic
    dominance (Saposnik, 1981, 1983), second order

    stochastic dominance (Shorrocks, 1983), and the Lorenz dominance analysis of the
    distribution (Atkinson, 1970). Moreover, following

    Pigou-Dalton principles, demonstrated by Marshall & Olkin (1979), alorenz also
    ranks two or more social states by analysing

    the Lorenz, Generalized Lorenz, and Pen''s Parade. alorenz also performs the two-sample
    Kolmogorov-Smirnov tests of the equality

    of distributions.'
  options:
  - points(#) sets the number of the distribution points. If the selected number of
    points is larger than the number of observations, alorenz will automatically adjust
    its value, and display a warning message. Default value 10.
  - by(groupvar) repeats the command for each group of observations for which the
    values of the variables in varlist are the same. Groupvar must be an integer variable.
  - order(varname) Selects an alternative variable the build the cumulative distribution.
    The default is the population.
  - gl plot the Lorenz curve (cumulated share of var by cumulated share of the population).
  - gp plot the Pen's Parade curve (max value of each percentile).
  - ge plot the Generalized Lorenz curve (cumulated mean of var by cumulated share
    of the population).
  - gom plot the mean of variable depvar against the mean of variable order as ordered
    by percentiles of the population by variable order.
  - goa plot the cumulated mean of variable depvar against the cumulated mean of variable
    order as ordered by percentiles of the population by variable order.
  - angle45 specifies that a 45 degree angel line is to the ploted at the Lorenz Curve.
  - format specify the display format for variables. Default format %12.2f.
  - output desired name of the data file writes in comma-separated format.
  - view specifies that the tabels are to be viewed on the Stata display window.
  - fullview specifies that all the possible variables are to be displayed at the
    Stata window.
  - grname(string) specifies an alternative name of the figures.
  - select(string) select particular observations to be marked on the plot.
  - invert invert the axis of the gl, gp, ge, gom or goa plots.
  - xdecrease invert the order the the x-axis, from increasing to decreasing.
  - base(refcat) sets the value of the comparation categoric group that defided the
    base group. If the base category was not defined alorenz will use the first category.
  - mark(value 1 ... value n) select particular values to be marked on the plot.
  - marklabel(valuelabel 1...valuelabel n) set the label for the selected values to
    be marked on the plot.
  - markvar(varname (categorical)) select the values of a particular categorical variable
    to be marked on the graph.
  - ksmirnov performs two-sample Kolmogorov-Smirnov tests of the equality of distributions.
    For more information please see ksmirnov.
  - exact specifies that the exact p-value be computed. This may take a long time
    if n > 50. For more information please see ksmirnov.
  - noisily displays on the Stata screen the results of the Kolmogorov-Smirnov tests.
  - compare Analysis the first order stochastic dominance (Saposnik, 1981, 1983),
    second order stochastic dominance (Shorrocks, 1983), and the Lorenz dominance
    of the distribution (Atkinson, 1970).
  - twoway_options accept any options other than name() or by() documented in [G]
    twoway_options
  examples: []
  stored_results:
  - 'max_: Pen''s Parade. ac_prop_: Loren''s Curve. ac_mean_: Generalized Loren''s
    Curve. speso: Population. ac_speso: Cumulative Population. prop_pop: Distribution
    of population. ac_prop_pop: Cumulative distribution of population. prop_: percentage
    of depvar by percentile.'
  references:
  - 'Atkinson, A.B., 1970, "On the Measurement of Inequality", Journal of Economic
    Theory, 2: 244-63. Dalton, H., 1920, "The Measurement of the Inequality of Incomes",
    Economic Journal, 30: 348-61. Marshall, A.W. and I.Olkin, 1979, Inequalities:
    Theory of Majorization and Its Applications. In: Mathematics in Science and Engineering,
    V. 143. Academic Press. Pigou, A.F., 1912, Wealth and Welfare, Macmillan, London.
    Saposnik, R., 1981, "Rank-Dominance in Income Distribution" Public Choice, 36
    pp147-151. Saposnik, R., 1983, "On Evaluating Income Distributions: Rank Dominance,
    the Suppes-Sen Grading Principle of Justice and Pareto Optimality", Public Choice,
    40: 329-36. Shorrocks A.F., 1983, "Ranking Income Distributions", Economica, 50:
    3-17.'
  authors:
  - Joao Pedro Azevedo
  - jazevedo@worldbank.org
  - Samuel Franco
  acknowledgements: ''
  also_see:
  - 'Manual: [R] lorenz Online: help for glcurve; inequal7; ineqdeco; ksmirnov; wbopendata(if
    installed)'
  version: ''
  other_derivation_of_the_pen_s_parade__lorenz_and_generalised_lorenz_curve_from_the_empirical_distribution: alorenz
    depvar [if exp] [in range] [weight] [ , points(number) by(varname) order(varname)
    gl gp ge gom goa angle45 format(string) output(string) view fullview compare base(refcat)
    grname(string) results(string) select(string) mlabangle(string) mlabsize(string)
    mark(value 1 ... value n) marklabel(valuelabel 1...valuelabel n) markvar(varname
    (categorical)) invert xdecrease ksmirnov exact noisily ] pweights, fweights and
    aweights are allowed; see help weights. See help weight.
  other_stocastic_dominance_analysis__marshall___olkin__1979_: 'I : Lack of envy.
    IE: Lack of envy and preference for equity. CE: Preference for growth with equity.'
  other_ado_dependencies: 'Paul Corral & Minh Cong Nguyen & Joao Pedro Azevedo, 2018.
    "GROUPFUNCTION: Stata module to replace several basic collapse functions," Statistical
    Software Components S458475, Boston College Department of Economics. <https://ideas.repec.org/c/boc/bocode/s458475.html>
    Daniel Klein, 2019. "WHICH_VERSION: Stata module to return location and programmer''s
    version of ado-files," Statistical Software Components S4584706, Boston College
    Department of Economics, revised 11 Nov 2019. <https://ideas.repec.org/c/boc/bocode/s458706.html>'
  other_aknowledgements: The authors would like to thank Andres Castaneda, Viviane
    Sanfelice, Gabriel Facchini, and Amer Hasan for their valuable suggestions. The
    usual disclaimer applies. alorenz uses the Stata user written command _pecats
    by J. Scott Long and Jeremy Freese., as well as groupfunction and which_version.
  help_file_type: sthlp
isopoverty:
  title: isopoverty
  short_description: ''
  syntax: isopoverty income [weight] [if exp] [in range] [ , varpl(varname) pline(number)
    poverty inequal stepgrw(number) stepinq(number) mininq(number) maxinq(number)
    mingrw(number) maxgrw(number) frontier int(number) target(number) ] fweights,
    and aweights are allowed; see help weights.
  description: 'isopoverty generates data that can be used to plot the Inequality-Poverty,
    Growth-Poverty and the Iso-Poverty curves

    (ECLAC, 2002; Bourguignon, 2002; Kakwani and Pernia, 2000; Bigsten and Shimeles,
    2003; Barros et al, 2005; Barros et al, 2003).

    stepgrw or stepinq have to be stated otherwise the programme does not work. If
    the option stepgrw is

    specified the ado automatically generates the Growth-Poverty data, likewise, if
    the option stepinq is spefied the program it

    will generate the Inequality-Poverty data. If both parameters are specified both
    procedures will be implemented.

    Please note that in order to provider a greater flexibility on the graph options
    this ado does not automatically produce any

    figures. The final output is stored as a matrix in the Stata memory (please see
    ereturn), in order to retrive it to the data set

    the use will have to use the svmat command. An illustration of a figure produced
    with data from this ado can be found

    in the examples below.

    Inequality -> r(ineqreduc)

    Growth -> r(growth)

    Iso-Poverty -> r(frontier)

    WARNING! The Iso-Poverty is quite computationally intensive. We strongly advice
    the user to first estimate the

    Inequality-Poverty curve and then the Growth-Poverty curve, in order to find out
    the best cut off points for the data that

    she or he is using.'
  options:
  - varpl(varname) provide the variable name containing the values poverty line.
  - pline(#) sets the value of the poverty line. The default poverty line is computed
    as half the median of varname.
  - poverty is the default output and includes the head count ratio and the extremme
    poverty head count ratio, several other poverty measures can be easily included
    in this output.
  - inequal includes the Gini and Theil inequallity measures in the output.
  - mininq(#) states the minimum inquality reduction. Default value 0.
  - maxinq(#) states the maximum inequality reduction. Default value 1.
  - stepinq(#) specifies the number of increments that will be ploted between the
    minium and maximum values of the inequality variation.
  - mingrw(#) states the minimum growth. Default value 0.
  - maxgrw(#) states the maximum growth. Default value 1.
  - stepgrw(#) specifies the number of increments that will be ploted between the
    minium and maximum values of the growth variation.
  - frontier this option has to be stated if the user wants to estimate the Iso-Poverty
    line, otherwise the ado will estimate the data for the Growth-Poverty and the
    Inequality-Poverty curvers separtely.
  - target specify the poverty rates as percentage of the population (head count)
    from the Iso-Poverty curve being estimated. Multiple values accepted. No default
    pre-determined.
  - int specify the interval of the poverty rate that is acceptable. This is a usefull
    option the user is using large increments on the both the poverty and inequalty
    variation. Default value 0.
  examples:
  - . isopoverty rdpc, stepinq(50)
  - . isopoverty rdpc, stepinq(50) varpl(lp)
  - . isopoverty rdpc [fw=peso], stepinq(50)
  - . mat temp=r(ineqreduc)
  - . svmat double temp
  - . graph twoway line temp2 temp1 if temp2>0, ytitle("Poverty - Head Count") xtitle("Inequality")
    name(temp1, replace)
  - . isopoverty rdpc [fw=peso], stepinq(50) varpl(lp)
  - . isopoverty rdpc, stepinq(50) inequal
  - . isopoverty rdpc, stepinq(50) stepgrw(10) mininq(0) maxinq(.50) mingrw(0) maxgrw(1.50)
    target(25) int(2) frontier varpl(lp)
  - . isopoverty rdpc [fw=peso], stepinq(50) stepgrw(10) mininq(0) maxinq(.50) mingrw(0)
    maxgrw(1.50) target(25) int(2) frontier varpl(lp)
  - . isopoverty gallT_ppp [fw=ipop], varpl(lp) stepinq(200) stepgrw(200) mininq(-.8)
    maxinq(.8) mingrw(0) maxgrw(3) target(5 15 30 41) int(.5) frontier
  - . mat temp=r(frontier)
  - . svmat double temp
  - . matrix list temp
  - . graph twoway ///
  - . (lowess temp1 temp2 if temp3 == 5) ///
  - . (lowess temp1 temp2 if temp3 == 15) ///
  - . (lowess temp1 temp2 if temp3 == 30) ///
  - . (lowess temp1 temp2 if temp3 == 41) ///
  - . , ytitle("Income change") xtitle("Distribution change") name(temp1, replace)
  - . graph twoway ///
  - . (lowess temp5 temp6 if temp3 == 5) ///
  - . (lowess temp5 temp6 if temp3 == 15) ///
  - . (lowess temp5 temp6 if temp3 == 30) ///
  - . (lowess temp5 temp6 if temp3 == 41) ///
  - . , ytitle("Income (level)") xtitle("Gini (level)") name(temp2, replace)
  stored_results: []
  references:
