adecomp:
  title: adecomp
  short_description: Shapley Decomposition by Components of a Welfare Measure
  syntax: ''
  description: 'adecomp implements the shapley decomposition of changes in a welfare
    indicator as proposed by

    Azevedo, Sanfelicce and Minh (2012). Following Barros et al (2006), this method
    takes advantage of the additivity property of a

    welfare aggregate to construct a counterfactual unconditional distribution of
    the welfare aggregate by changing each

    component at a time to calculate their contribution to the observed changes in
    poverty and inequality.

    Given that the distribution of a observable welfare measure (i.e. income or consumption)
    for period 0 and period 1 are known, we can construct counterfactual

    distributions for period 1 by substituting the observed level of the indicators
    c in period 0, one at a time. For each

    counterfactual distribution, we can compute the poverty or inequality measures,
    and interpret those counterfactuals as the poverty or inequality

    level that would have prevailed in the absence of a change in that indicator.

    As much of the micro-decomposition literature, approaches of this nature traditionally
    suffer from path-dependence (See Essama-Nssah (2012), Fortin et al (2011) and

    Ferreira (2010) for recent reviews of the literature), in other words, the order
    in which the cumulative effects are calculated

    matters . One of the major contributions of Azevedo, Sanfelicce and Minh (2012)
    is the implementation of the best known remedy for path-dependence which is to

    calculate the decomposition across all possible paths and then take the average
    between them. These averages are also known as

    the Shapley-Shorrocks estimates of each component, implying that we estimate every
    possible path to decompose these components

    and then take the average of these estimates (See Shapley (1953) and Shorrocks
    (1999)).

    There is one remaining caveat to this approach: the counterfactual income distributions
    on which these decompositions suffer

    from equilibrium-inconsistency. Since we are modifying only one element at a time,
    the counterfactuals are not the result of

    an economic equilibrium, but rather a statistical exercise in which we assume
    that we can in fact modify one factor at a time

    and keep everything else constant.

    For further examples of implementations of this approach please see Azevedo, Inchausete
    and Sanfelice (2012).

    welfarevar is the welfare aggregate variable.

    components are the components used to construct the welfare variable, and which
    will be for the

    decomposition.

    by is the comparison indicator. It must take two categorical values and is usually
    defines two points

    in time or two geographic locations, which the difference of the indicator of
    choice is being decomposed.

    eq:uation() captures the relationship between welfarevar and components.

    The component variables in varlist must be denoted by c#, and must be separated
    by an arithmetic operator.'
  options:
  - in:dicator(string) poverty and inequality indicators. fgt0, fgt1, fgt2, gini,
    theil, and mean are the currently supported options.
  - t:op(#), b:ottom(#) mean at bottom x%, top y% of the welfarevar distribution,
    and mr:atio is the ratio between the mean of bottom x% over the mean of the whole
    distribution.
  - 'mid:dle(# #) mean at middle part of distribution between x% and y%.'
  - varpl(varname) poverty line variable. It must be specified when fgt0, fgt1 and/or
    fgt2 indicators are used.
  - mpl(numlist) allow to calculate the poverty indicators by multiple of the poverty
    line. It can be specified when fgt0, fgt1 and/or fgt2 indicators are used.
  - 'gic(#) use as indicator the percentual change on the average of welfarevar in
    which one of its # percentile, i.e., decomposing the Growth Incidence Curve of
    welfarevar. You need to specify a number of bins'
  - gr:oup(varname) the indicators are calculated by each group of groupvar. Differ
    from the if option because do not restrict the database. Groupvar must be a numeric
    and discrete variable.
  - id(varname) to specify the identificator variable in case of balanced panel data.
    The observed value of the unit of analysis is going to be used when changing the
    distribution.
  - strata(varlist) allow the transposition of distributions be made within groups
    created using the variables listed in varlist.
  - r:ank(string) specific the rank of which variable must be used when changing the
    distribution. It can be a varname or typing components the rank of each component
    is going to be used. Default is welfarevar rank.
  - 'perc:entile(#) used # percentile of componentvar to change the distribution.
    Default is to rescale the dataset in each period.'
  - m:ethod(string) specify the method for Shapley decomposition, the default is "difference".
    The other option is "growth" and the results are the annualized growth using the
    exponential growth rate definition such as r = ln(Yt/Y1)/T, and T is the difference
    between period 0 and period 1.
  - oneway decomposition is made only one way from period 0 to period 1. Default is
    both ways.
  - std returns the standard deviation of the effect, besides the average.
  - s:tats returns specified poverty and inequality indicators, and statistics of
    variables in the equation.
  examples:
  - . adecomp percapitainc laborinc nonlaborinc, by(year) equation(c1+c2) indicator(fgt0
    fgt1 fgt2 gini theil) varpl(pline)
  - . adecomp percapitainc laborinc nonlaborinc, by(year) equation(c1+c2) in(fgt0)
    varpl(pline) gic(100)
  - . adecomp percapitainc laborinc nonlaborinc, by(year) equation(c1+c2) indicator(fgt0)
    varpl(pline) mpl(1 3.5)
  - . adecomp percapitainc laborinc nonlaborinc, by(year) equation(c1+c2) indicator(fgt0
    fgt1 fgt2 gini theil) varpl(pline) gic(100) strata(urban)
  - . adecomp percapitainc laborinc nonlaborinc, by(year) equation(c1+c2) indicator(fgt0
    fgt1 fgt2 gini theil) varpl(pline) gic(100) id(hh_id)
  - . adecomp percapitainc laborinc nonlaborinc [w=weight], by(year) equation(c1+c2)
    indicator(fgt0 fgt1 fgt2) varpl(pline) group(region)
  - . adecomp percapitainc laborinc nonlaborinc if (region == 1), by(year) equation(c1+c2)
    indicator(gini)
  - . adecomp percapitainc padults laborinc capitalinc pensioninc transferinc othersinc,
    by(year) equation(c1*(c2+c3+c4+c5+c6)) indicator(fgt0) varpl(pline)
  - . adecomp percapitainc padults laborinc capitalinc pensioninc transferinc othersinc,
    by(year) equation(c1*(c2+c3+c4+c5+c6)) indicator(fgt0 fgt1 fgt2 gini theil mean)
    varpl(pline) bottom(40) method(growth) (click to run the example below)
  - . use exdata_adecomp.dta, clear
  - . adecomp ipcf_ppp ila_ppp itran_ppp ijubi_ppp icap_ppp others /// [w=pondera],
    by(ano) eq(c1+c2+c3+c4+c5) /// varpl(lp_2usd_ppp) in(fgt0 fgt1 fgt2 gini theil)
  - . mat result = r(b)
  - . mat colnames result = indicator effect rate
  - . drop _all
  - . svmat double result, n(col)
  - . label define indicator 0 "FGT0" 1 "FGT1" 2 "FGT2" 3 "Gini" 4 "Theil"
  - . label values indicator indicator
  - . label define effect /// 1 "Labor" /// 2 "Transfer" /// 3 "Pension" /// 4 "Capital"
    /// 5 "Others" /// 6 "Total change"
  - . label values effect effect
  - . local total 6
  - . gen aux=rate if effect==`total'
  - . egen total_effect=sum(aux) , by(indicator)
  - . drop aux
  - . gen share_effect= -100*rate/abs(total_effect)
  - . keep if effect!=6
  - . graph bar share_effect , over(effect, label(labsize(*0.6))) /// by(indicator)
    blabel(bar, format(%16.1fc) size(*.98)) /// ytitle(Share of the component effect
    in the total change)
  stored_results:
  - 'adecomp returns results in r() format. By typing return list, the following results
    are reported: ... r(path): number of paths of the shapley decomposition r(component):
    number of components of the decomposition r(N): number of observations utilized
    on the calculation r(b): average effect of each components based on all paths.
    r(sd): standard deviation of the effects based on all paths. If option std is
    specify. r(gic): average effect of each components based on all paths when the
    indicators are the changes on welfarevar() by bin. r(sd_gic): standard deviation
    of each components based on all paths when the indicators are the changes on welfarevar()
    by bin. If option std is specify. r(stats): poverty and inequality indicators.
    If option stats is specify. r(statsvar): summary statistics of factors. If option
    stats is specify. Obs: On the reported matrices Index label: 0 - FGT(0); 1 - FGT(1);
    2 - FGT(2); 3 - Gini; 4 - Theil; 5 - Mean; 6 - Bottom(); 7 - Top(); 8 - Bottom()/Mean;
    9 - Middle(# #). Effect label: 1 represents the first component listed on the
    command, and so on. Total of components plus 1 represents the total change on
    the indicator and plus 2 denotes the residual, when this option is specified.
    Important: To guarantee precision, we recommend to use double when create variables.'
  references:
  - 'Azevedo, Joao Pedro, Viviane Sanfelice and Minh Cong Nguyen (2012) Shapley Decomposition
    by Components of a Welfare Measure. MPRA Paper 85584, University Library of Munich,
    Germany. https://ideas.repec.org/p/pra/mprapa/85584.html Azevedo, Joao Pedro,
    Gabriela Inchauste, and Viviane Sanfelice (2013) "Decomposing the recent inequality
    decline in Latin America," Policy Research Working Paper Series 6715, The World
    Bank. https://ideas.repec.org/p/wbk/wbrwps/6715.html Azevedo, Joao Pedro, Gabriela
    Inchauste, Sergio Olivieri, Jaime Saavedra, and Hernan Winkler. (2013) "Is labor
    income responsible for poverty reduction ? a decomposition approach," Policy Research
    Working Paper Series 6414, The World Bank. https://ideas.repec.org/p/wbk/wbrwps/6414.html
    Barros, Ricardo Paes de. Carvalho, Mirela de. Franco, Samuel. Mendoça, Rosane
    (2006). "Uma Análise das Principais Causas da Queda Recente na Desigualdade de
    Renda Brasileira." In: Revista Econômica. Volume 8, número 1, p.117-147. Universidade
    Federal Fluminense. Rio de Janeiro. https://doi.org/10.22409/economica.8i1.p158
    Essama-Nssah, B. (2012). "Identification of Sources of Variation in Poverty Outcomes",
    World Bank Policy Research Working Papers, No. 5954. Ferreira Francisco H.G. (2010)
    "Distributions in Motion: Economic Growth, Inequality and Poverty Dynamics". World
    Bank Policy Research Working Paper No. 5424. The World Bank, Washington, D.C.
    Fortin Nicole, Lemieux Thomas and Firpo Sergio. (2011). "Decomposition Methods
    in Economics". In: Ashenfelter Orley and Card David (eds) Handbook of Labor Economics,
    Vol. 4A , pp. 1-102. Northolland, Amsterdam.. Inchauste, Gabriela , João Pedro
    Azevedo, Sergio Olivieri, Jaime Saavedra, and Hernan Winkler (2012) When Job Earnings
    Are behind Poverty Reduction. Economic Premise, November 2012, Number 97. World
    Bank: Washington DC. http://siteresources.worldbank.org/EXTPREMNET/Resources/EP97.pdf
    Shapley, L. (1953). "A value for n-person games", in: H. W. Kuhn and A. W. Tucker
    (eds.), Contributions to the Theory of Games, Vol. 2 (Princeton, N.J.: Princeton
    University Press). Shorrocks, Anthony (2012) Decomposition procedures for distributional
    analysis: a unified framework based on the Shapley value. Journal of Economic
    Inequality http://dx.doi.org/10.1007/s10888-011-9214-z World Bank (2012) The Effect
    Of Women''S Economic Power: in Latin America and the Caribbean. LAC Poverty and
    Labor Brief. World Bank: Washington DC. http://www.bancomundial.org/content/dam/Worldbank/document/PLBSummer12latest.pdf'
  authors:
  - Joao Pedro Azevedo, jazevedo@worldbank.org
  - Minh Cong Nguyen, mnguyen3@worldbank.org
  - Viviane Sanfelice, vsanfelice@worldbank.org
  acknowledgements: 'The authors would like to thank Gabriela Inchauste, Samuel Freije,
    Andres Castaneda and

    Gabriel Facchini for their valuable suggestions. The code from Samuel Franco and
    Sergio Oliveri were used

    for inspiration in a few passages of this ado and should be greatfully acknowledged.


    All errors and ommissions are of exclusive responsability of the authors.


    This program was developed by the http://go.worldbank.org/IYDYF1BG70 (2012), in
    the

    Latin American and Caribbean Poverty Reduction and Economic Managment Group of
    the World Bank.'
  also_see:
  - 'Online: help for apoverty; ainequal; wbopendata; mpovline; drdecomp; skdecomp;
    tabmult; xtsur (if installed)'
  version: version 1.5
  citation: Azevedo, Joao Pedro, Viviane Sanfelice and Minh Cong Nguyen (2012) Shapley
    Decomposition by Components of a Welfare Measure. World Bank. (mimeo)
  other_github_respository: For previous releases please visit ADECOMP https://github.com/jpazvd/adecomp
  help_file_type: sthlp
drdecomp:
  title: drdecomp
  short_description: Shapley value of growth and distribution components of on changes
    in poverty indicators
  syntax: drdecomp welfarevar [weight] [if exp] [in exp], by(varname) varpl(varlist)
    [ indicator(string) mpl(numlist) ] fweights and aweights are allowed; see help
    weights. See help weight.
  description: 'drdecomp implements the shapley value of the Datt and Ravallion (1992)
    decomposition of changes in a welfare indicator into growth and distribution,

    however, following the shapley and non parametric methodology suggested by Shorrocks
    (1999/2012) and Kolenikov and Shorrocks (2003).

    For examples of applications please see Azevedo and Sanfelice (2012) and Ferreira
    et al (2012).

    welfarevar is the welfare aggregate variable.

    by is the comparison indicator. It must take two categorical values and is usually
    defines two points

    in time or two geographic locations, which the difference of the indicator of
    choice is being decomposed.

    varpl(varname) poverty line variable.'
  options:
  - in:dicator(string) poverty indicators. fgt0, fgt1, fgt2 are the currently supported
    options. fgt0 is the indicator default.
  - mpl(numlist) allow to calculate the poverty indicators by range using multiples
    of the poverty line.
  examples:
  - . drdecomp percapitainc, by(year) varpl(pline)
  - . drdecomp percapitainc, by(year) varpl(pline) in(fgt0 fgt1 fgt2)
  - . drdecomp percapitainc, by(year) varpl(pline) mpl(1 3.5 6) (click to run the
    example below)
  - . use exdata_drdecomp, clear
  - . drdecomp income [w=weight], by(year) varpl(lp_4usd_ppp) ///
  - . in(fgt0 fgt1 fgt2)
  stored_results:
  - 'drdecomp returns results in r() format. By typing return list, the following
    results are reported: ... r(b): average effect of the two factors and the total
    change on the poverty indicator. r(shapley): besides the average effect, returns
    the contribution for the two paths. r(poverty): returns the value of the indicator
    by categorical value of by. Obs: On the reported matrices Indicator label: 0 -
    FGT(0); 1 - FGT(1); 2 - FGT(2). Effect label: 1 represents the growth; 2 redistribtuion
    and 3 the total change on the indicator. Line label (if mpl specified): 1 represents
    the first multiple; 2 the second, and so on. The last indicates the range from
    the last multiple and the maximun value.'
  references:
  - 'Azevedo, Joao Pedro and Viviane Sanfelice (2012) "The rise of the middle class
    in Latin America". World Bank (mimeo). Ferreira, Francisco H.G.; Messina, Julian;
    Rigolini, Jamele; López-Calva, Luis-Felipe; Lugo, Maria Ana; Vakis, Renos. (2013)
    Economic Mobility and the Rise of the Latin American Middle Class. Washington,
    DC: World Bank. https://openknowledge.worldbank.org/handle/10986/11858 Datt, G.;
    Ravallion, M. (1992) Growth and Redistribution Components of Changes in Poverty
    Measures: A Decomposition with Applications to Brazil and India in the 1980s.
    Journal of Development Economics, 38: 275-296. Shorrocks, A. F. (2012) Decomposition
    procedures for distributional analysis: a unified framework based on the Shapley
    value. Journal of Economic Inequality. Shorrocks, A.; Kolenikov, S. (2003) A Decomposition
    Analysis of Regional Poverty in Russia, Discussion Paper No. 2003/74 United Nations
    University. World Bank (2011) On The Edge Of Uncertainty: Poverty Reduction in
    Latin America and the Caribbean during the Great Recession and Beyond. LAC Poverty
    and Labor Brief. World Bank: Washington DC. http://siteresources.worldbank.org/INTLAC/Resources/LAC_poverty_report.pdf'
  authors:
  - Joao Pedro Azevedo, jazevedo@worldbank.org
  - Andres Castanedas, acastanedaa@worldbank.org
  - Viviane Sanfelice, vsanfelice@worldbank.org
  acknowledgements: This program was developed by the http://go.worldbank.org/IYDYF1BG70
    (2012), in the Latin American and Caribbean Poverty Reduction and Economic Managment
    Group of the World Bank.
  also_see:
  - 'Online: help for gidecomposition; apoverty; ainequal; wbopendata; adecomp; mpovline;
    skdecomp (if installed)'
  version: ''
  other_shapley_value_of_growth_and_distribution_components_of_on_changes_in_poverty_indicators: drdecomp
    welfarevar [weight] [if exp] [in exp], by(varname) varpl(varlist) [ indicator(string)
    mpl(numlist) ] fweights and aweights are allowed; see help weights. See help weight.
  help_file_type: sthlp
skdecomp:
  title: skdecomp
  short_description: Shapley value of growth, price, and distribution components of
    on changes in poverty indicators
  syntax: skdecomp welfarevar [weight] [if exp] [in exp] , by(varname) varpl(varname)
    [ indicator(string) mpl(numlist) idpl(varname) ] fweights and aweights are allowed;
    see help weights. See help weight.
  description: 'skdecomp implements the shapley value of Kolenikov and Shorrocks (2003)
    decomposition of changes in a welfare

    indicator into growth, distribution and price.

    welfarevar is the welfare aggregate variable.

    by is the comparison variable. It must take two categorical values and is usually
    defines as two points

    in time or two geographic locations, which the difference of the indicator is
    being decomposed.

    varpl(varname) poverty line variable.'
  options:
  - in:dicator(string) poverty indicators. fgt0, fgt1, fgt2 are the currently supported
    options. fgt0 is the indicator default.
  - mpl(numlist) allow to calculate the poverty indicators by range using multiples
    of the poverty line.
  - idpl(varname) to switch the poverty line in case the poverty line is not constant
    to all the observation in one categorical of by. For instance, there are different
    poverty lines to urban and rural areas.
  examples:
  - . skdecomp income, by(year) varpl(pline)
  - . skdecomp income, by(year) varpl(pline) idpl(region)
  - . skdecomp income, by(year) varpl(pline) in(fgt0 fgt1 fgt2)
  - . skdecomp income, by(year) varpl(pline) mpl(1 2.5 6) (click to run the example
    below) {Original SK decomposition - welfare and poverty line variable in nominal
    terms}
  - . skdecomp ipcf [w=pondera], by(ano) varpl(lp_4usd) ///
  - . in(fgt0 fgt1 fgt2)
  stored_results:
  - 'skdecomp returns results in r() format. By typing return list, the following
    results are reported: ... r(b): average effect by factors and the total change
    on the poverty indicator. r(shapley): besides the average effect, returns the
    contribution of each paths. r(poverty): returns the value of the indicator by
    categorical value of by. Obs: On the reported matrices Indicator label: 0 - FGT(0);
    1 - FGT(1); 2 - FGT(2). Effect label: 1 represents the growth; 2 distribtuion;
    3 line and 4 the total change in percentage points on the indicator. Line label
    (if mpl specified): 1 represents the first multiple; 2 the second, and so on.
    The last indicates the range from the last multiple and the maximun value.'
  references:
  - 'Shorrocks, A.; Kolenikov, S. A Decomposition Analysis of Regional Poverty in
    Russia, Discussion Paper No. 2003/74 United Nations University, 2003. Shorrocks,
    A. F. Decomposition procedures for distributional analysis: a unified framework
    based on the Shapley value. Journal of Economic Inequality, 2012. World Bank (2011)
    On The Edge Of Uncertainty: Poverty Reduction in Latin America and the Caribbean
    during the Great Recession and Beyond. LAC Poverty and Labor Brief. World Bank:
    Washington DC. http://siteresources.worldbank.org/INTLAC/Resources/LAC_poverty_report.pdf'
  authors:
  - Bernardo Atuesta,
  - Joao Pedro Azevedo, jazevedo@worldbank.org
  - Andres Castanedas, acastanedaa@worldbank.org
  - Viviane Sanfelice, vsanfelice@worldbank.org
  acknowledgements: This program was developed by the http://go.worldbank.org/IYDYF1BG70
    (2012), in the Latin American and Caribbean Poverty Reduction and Economic Managment
    Group of the World Bank.
  also_see:
  - 'Online: help for gidecomposition; apoverty; ainequal; wbopendata; adecomp; mpovline;
    drdecomp (if installed)'
  version: ''
  other_shapley_value_of_growth__price__and_distribution_components_of_on_changes_in_poverty_indicators: skdecomp
    welfarevar [weight] [if exp] [in exp] , by(varname) varpl(varname) [ indicator(string)
    mpl(numlist) idpl(varname) ] fweights and aweights are allowed; see help weights.
    See help weight.
  help_file_type: sthlp
apoverty:
  title: apoverty
  short_description: Poverty Measures (revised)
  syntax: apoverty varlist [weight] [if exp] [in exp] [, line(#) varpl(varname) gen(newvarname)
    all h h2 apg pgr igr w s tak thon fgt1 fgt2 fgt3 fgt4 fgt5 fgt6 fgt7 fgt8 fgt9
    chu1 chu2 chu3 chu4 chu5 ] aweights, fweights and pweights are allowed; see help
    weights.
  description: 'apoverty computes a series of poverty measures based on the (income)

    distribution described by varname. It is a revised and upgraded version

    of poverty published by Philippe Van Kerm.

    The poverty measures that can be computed by

    headcount ratio extreme poverty hratio aggregate poverty gap

    poverty gap ratio income gap ratio Watts index

    Sen index Takayama index Thon index,

    and series of Foster, Greer and Thorbecke indices with parameters :

    0.5, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5

    Clark et al. indices with parameters :

    0.1, 0.25, 0.5, 0.75, 0.9

    The poverty line is either directly specified by the user or computed relative

    to the median of varname (half or two-third), see under "options" below. The extreme

    poverty line is directly speciefied as half of the poverty line used in the exercise.

    Up to 5 variables can be specified in varlist.'
  options:
  - 'line(#) sets the value of the poverty line. If # is set equal to -1, the poverty
    line is computed as half the median of varname. If # is set equal to -2, it is
    computed as two-third of the median of varname. Default is -1.'
  - varpl(varname) provide the variable name containing the values of the poverty
    line.
  - gen(newvarname) creates a new variable that takes on the value of 1 for all observations
    identified as poor and 0 for observations identified as non-poor. "newvarname"
    is set to missing for observations with missing "varname" or falling outside the
    ^if in^ statements. If more than one variable is specified on the varlist variable
    created will refered to this last income variable.
  - all requests that all possible measures are computed and reported. By default,
    no measure is produced. The following options specify the measures to be computed
    and reported.
  - 'h : headcount ratio [FGT(0)]'
  - 'h2 : extremem poverty headcount ratio'
  - 'apg : aggregate poverty gap'
  - 'pgr : poverty gap ratio [FGT(1)]'
  - 'igr : income gap ratio'
  - 'w : Watts index'
  - 's : Sen index'
  - 'tak : Takayama index'
  - 'thon : Thon index'
  - 'fgt1 : Foster, Greer and Thorbecke -FGT(0.5)-'
  - 'fgt2 : Foster, Greer and Thorbecke -FGT(1.5)-'
  - 'fgt3 : Foster, Greer and Thorbecke -FGT(2)-'
  - 'fgt4 : Foster, Greer and Thorbecke -FGT(2.5)-'
  - 'fgt5 : Foster, Greer and Thorbecke -FGT(3)-'
  - 'fgt6 : Foster, Greer and Thorbecke -FGT(3.5)-'
  - 'fgt7 : Foster, Greer and Thorbecke -FGT(4)-'
  - 'fgt8 : Foster, Greer and Thorbecke -FGT(4.5)-'
  - 'fgt9 : Foster, Greer and Thorbecke -FGT(5)-'
  - 'chu1 : Clark, Ulph and Hemming index with beta of 0.10'
  - 'chu2 : Clark, Ulph and Hemming index with beta of 0.25'
  - 'chu3 : Clark, Ulph and Hemming index with beta of 0.50'
  - 'chu4 : Clark, Ulph and Hemming index with beta of 0.75'
  - 'chu5 : Clark, Ulph and Hemming index with beta of 0.90'
  examples: []
  stored_results:
  - 'apoverty returns results in r() format. [Important notice: When multiple variables
    are entered in varlist, returned results are for all inequality measures of the
    variable listed.]'
  references: []
  authors:
  - Joao Pedro Azevedo
  - jazevedo@ipea.gov.br
  - IPEA
  - This is a modified version of the ado poverty2 written by Philippe Van Kerm.
  acknowledgements: ''
  also_see:
  - 'On-line: help for povdeco & poverty if installed'
  version: ''
  other_poverty_measures__revised_: apoverty varlist [weight] [if exp] [in exp] [,
    line(#) varpl(varname) gen(newvarname) all h h2 apg pgr igr w s tak thon fgt1
    fgt2 fgt3 fgt4 fgt5 fgt6 fgt7 fgt8 fgt9 chu1 chu2 chu3 chu4 chu5 ] aweights, fweights
    and pweights are allowed; see help weights.
  help_file_type: hlp
ainequal:
  title: ainequal
  short_description: Measures of inequality (revised)
  syntax: 'ainequal varlist [weight] [if exp] [in range] [, f:ormat(%fmt) ATKinson
    EPSilon(#[ #[ ...]]) RELSGini Delta(#[ #[ ...]]) shorrocks alpha(#[ #[ ...]])
    nogini notheil rmd cov sdl mehran piesch kakwani mld ge_1 ge2 all benchmark] aweights
    and fweights are allowed; see help weights.'
  description: 'ainequal computes a series of inequality measures of the variables
    in

    varlist. It is a revised and upgraded version of inequal7 and inequal

    published by Edward Whitehouse in STB-23.

    The inequality measures computed are: the "relative mean deviation",

    the "coefficient of variation", the "standard deviation of logs", the"Gini

    index", the "Mehran index", the "Piesch index", the "Kakwani index", "Theil

    entropy index", the "mean log deviation", the "generalised entropy measure"

    for all sensitivity [see, e.g., Cowell [1995] and Amiel and Cowell [1999] for
    a

    definition of these measures], the "Atkinson Inequality Index" using the inequality

    aversion parameter epslon, and the "Donaldson-Weymark relative S-Gini" using the

    distributional sensitivity paramether delta.

    In addition ainequal also computes the relative poverty line proposed by Hoffmann
    [2001]

    and Lambert and Lanza [2006], for the Gini, Theil-T and Theil-L.

    Up to 5 variables can be specified in varlist.'
  options: []
  examples: []
  stored_results:
  - 'ainequal returns results in r() format. [Important notice: When multiple variables
    are entered in varlist, returned results are for all inequality measures of the
    variable listed.]'
  references:
  - Amiel, Y. and Cowell, F.A. (1999) Thinking about Inequality. Cambridge University
    Press. United Kingdom. Coulter Ph. (1989), Measuring Inequality -A Methodological
    Handbook-, Westview Press USA. Cowell, F.A. (1995). Measuring Inequality (second
    edition). Prentice-Hall/Harvester-Wheatsheaf, Hemel Hempstead. Hoffmann, R. (2001)
    Effect of the rise of a person's income on inequality. Brazlian Review of Econometrics
    v.21, no.2, pp.237-262. Lambert, P.J. and Lanza, G. (2006) The effect on inequalities
    of changing one or two incomes. The Journal of Economic Inequality. 4:253-277.
  authors:
  - Joao Pedro Azevedo
  - jazevedo@ipea.gov.br
  - IPEA
  - This is a modified version of the ado inequal7 written by Philippe Van Kerm.
  acknowledgements: ''
  also_see:
  - 'Manual: [R] lorenz STB: sg30 (STB-23) On-line: help for inequal (if installed),
    inequal7 (if installed), ineqdeco (if installed)'
  version: ''
  other_measures_of_inequality__revised_: 'ainequal varlist [weight] [if exp] [in
    range] [, f:ormat(%fmt) ATKinson EPSilon(#[ #[ ...]]) RELSGini Delta(#[ #[ ...]])
    shorrocks alpha(#[ #[ ...]]) nogini notheil rmd cov sdl mehran piesch kakwani
    mld ge_1 ge2 all benchmark] aweights and fweights are allowed; see help weights.'
  other_option: format(%fmt) specifies the format to be used to display the estimated
    inequality indices. The default is to use a %6.5f format. delta() specifies the
    distributional sensitivity parameters used in computing the relative S-Gini. epsilon()
    specifies the inequality aversion parameters used in computing Atkinson inequality
    index. alpha() specifies the sensitivity alpha used on the generalised entropy
    measure. all requests that all possible measures are computed and reported. By
    default, no measure is produced. The Gini and Theil are the deafult measures.
    benchmark calculates the Relative Poverty Line (Hoffmann, 2001) or Benchmark Income
    Level (Lambert and Lanza, 2006) for the Gini, Theil-L and Theil-T. The following
    options specify the measures to be computed and reported. rmd contain the "relative
    mean deviation" cov contain the "coefficient of variation" sdl contain the "standard
    deviation of logs" mehran contain the "Mehran index" piesch contain the "Piesch
    index" kakwani contain the "Kakwani index" mld contain the "Mean Log Deviation
    (or generalised entropy measure with sensitivity parameter 0)" ge_1 contain the
    "Generalised entropy measure with sensitivity parameter -1" ge2 contain the "Generalised
    entropy measure with sensitivity parameter 2"
  help_file_type: hlp
mpovline:
  title: mpovline
  short_description: Calculate FGT0, FGT1 and FGT2 by intervals of multiple welfare
    lines.
  syntax: mpovline welfarevar [weight] [if exp] [in exp], [ varpl(varname) lines(numlist)
    indicator(string) mpl(numlist) max ] fweights and aweights are allowed; see help
    weights. See help weight.
  description: 'mpovline calculate FGT0, FGT1 and FGT2 by intervals of multiple welfare
    lines. It is useful to calculate

    headcount for the poor, vulnerable and middle class lines as proposed by Ferreira
    et al (2012), and the respective

    FGT1 and FGT2 reported by Azevedo and Sanfelice (2012).

    welfarevar is the welfare aggregate variable.'
  options:
  - varpl(varname) poverty line variables.
  - line:s(numlist) sets of values for the poverty lines.
  - in:dicator(string) poverty indicators. fgt0, fgt1, fgt2 are the currently supported
    options. fgt0 is the indicator default.
  - mpl(numlist) to calculate the poverty indicators by range using multiples of the
    poverty line. Must be combined with the varpl option
  - max poverty indicators for the range between the last line and the maximun value
    of welfarevarIt is quite sensitive to outliers.
  examples:
  - . mpovline percapitainc, varpl(pline1 plin2)
  - . mpovline percapitainc [w=weight], line(100 500) in(fgt0 fgt1 fgt2)
  - . mpovline percapitainc [w=weight], varpl(pline) mpl(1 3.5 6) Headcount for moderate
    poverty, vunerable and middle class in terms of $4USD a day, $4 to 10USD a day
    and $10 to 50USD a day, respectively.
  - . mpovline percapitainc [w=weight], varpl(lp_4usd_ppp) mpl(1 2.5 12.5) or
  - . mpovline percapitainc [w=weight], line(121.68 304.2 1521) or
  - . mpovline percapitainc [w=weight], varpl(lp_4usd_ppp lp_10usd_ppp lp_50usd_ppp)
  stored_results:
  - 'mpovline returns results in r() format. By typing return list, the following
    results are reported: ... r(b): matrix in long format. The first column represents
    the index used, the sencond the range of the poverty line used and the last column
    reports the poverty numbers. r(fgt): short version of the matrix r(b) with results
    by indicator. r(fgt0), r(fgt1) and r(fgt2) if indicator option specified. r(obs):
    matrix with the number of observation by range of the lines. Obs: On the reported
    matrices Indicator label: 0 - FGT(0); 1 - FGT(1); 2 - FGT(2). Line label: 1 represents
    the first range; 2 the second, and so on. The last number indicates the range
    from the last line and the maximun value if the option max is specified.'
  references:
  - "Azevedo, Joao Pedro and Viviane Sanfelice (2012) \"The rise of the middle class\
    \ in Latin America\". World Bank (mimeo). Ferreira, Francisco H.G.; Messina, Julian;\
    \ Rigolini, Jamele; López-Calva, Luis-Felipe; Lugo, Maria Ana; Vakis, Renos. (2013)\
    \ Economic Mobility and the Rise of the Latin American Middle Class. Washington,\
    \ DC: World Bank. https://openknowledge.worldbank.org/handle/10986/11858 Foster,\
    \ James; Joel Greer and Erik Thorbecke (1984) \"A class of decomposablepoverty\
    \ measures\". Econometrica. 2 81: 761\x96766. Lopez-Calva, Luis F. and Eduardo\
    \ Ortiz-Juarez (2011) \"A Vulnerability Approach to the Definition of the Middle\
    \ Class\". Policy Research Working Paper, World Bank, n. 5902."
  authors:
  - Joao Pedro Azevedo, jazevedo@worldbank.org
  - Viviane Sanfelice, vsanfelice@worldbank.org
  acknowledgements: This program was developed by the http://go.worldbank.org/IYDYF1BG70
    (2012), in the Latin American and Caribbean Poverty Reduction and Economic Managment
    Group of the World Bank.
  also_see:
  - 'Online: help for apoverty; ainequal; wbopendata; adecomp; drdecomp; skdecomp
    (if installed)'
  version: ''
  other_calculate_fgt0__fgt1_and_fgt2_by_intervals_of_multiple_welfare_lines_: mpovline
    welfarevar [weight] [if exp] [in exp], [ varpl(varname) lines(numlist) indicator(string)
    mpl(numlist) max ] fweights and aweights are allowed; see help weights. See help
    weight.
  help_file_type: sthlp
sae:
  title: sae
  short_description: ''
  syntax: 'help for sae World Bank/Poverty and Equity GP - GSG1 ... }Introduction
    to sae - small area estimation packages ... [Suggestion: Read [SAE] intro substantive
    first.] ...'
  description: 'The sae suite of commands deals with small area estimation,

    abbreviated as sae data. To become familiar with sae

    as quickly as possible, do the following

    1. See A simple example under ...

    Remarks below.

    2. If you have data that require simulating, see

    [SAE] sae data

    [SAE] sae simulate

    3. Alternatively, if you have already simulated data, see

    [SAE] sae proc

    4. To fit your model, see

    [SAE] sae model

    To perform data related functins such as to import the target dataset to a more
    manageable

    format for the simulations; to export the resulting simulations to a dataset of
    the

    user’s preference; and to compare the variables between the sources of data.

    sae data import...

    import sae data into Mata data file

    sae data export...

    export sae Mata data file to Stata data

    To perform first stage estimation on sae data. This routine is for obtaining the
    GLS estimates of the first stage. The

    sub-routines, sae model lmm (linear mixed model) and sae model povmap (povmap)
    are used interchangeably

    sae model lmm...

    model first stage estimations for the linear mixed models

    To perform second stage estimation on sae data. This routine and sub-routine obtains
    the GLS estimates of the first

    stage, and goes on to perform the Monte Carlo simulations

    sae sim lmm...

    simulate based on first stage models for the linear mixed models

    The stats and inds sub-routines are useful for processing Mata formatted

    simulation output and producing indicators with new thresholds or weights, as
    well as profiling.

    sae proc stats...

    produce the statistics based on simulated data

    sae proc ind...

    prodiuce Poverty and Inequality indictors based on simulated data'
  options: []
  examples: []
  stored_results: []
  references:
  - 'Bedi, T., A. Coudouel, and K. Simler (2007). More than a pretty picture: using
    poverty maps to design better policies and interventions. World Bank Publications.
    Demombynes, G., C. Elbers, J. O. Lanjouw, and P. Lanjouw (2008). How good is a
    map? putting small area estimation to the test. Rivista Internazionale di Scienze
    Sociali, 465–494. Elbers, C., J. O. Lanjouw, and P. Lanjouw (2002). Micro-level
    estimation of welfare. 2911. Elbers, C., J. O. Lanjouw, and P. Lanjouw (2003).
    Micro–level estimation of poverty and inequality. Econometrica 71 (1), 355–364.
    Foster, J., J. Greer, and E. Thorbecke (1984). A class of decomposable poverty
    measures. Econometrica: Journal of the Econometric Society, 761–766. Harvey, A.
    C. (1976). Estimating regression models with multiplicative heteroscedasticity.
    Econometrica: Journal of the Econometric Society, 461–465. Haslett, S., M. Isidro,
    and G. Jones (2010). Comparison of survey regression techniques in the context
    of small area estimation of poverty. Survey Methodology 36 (2), 157–170. Henderson,
    C. R. (1953). Estimation of variance and covariance components. Biometrics 9 (2),
    226–252. Huang, R. and M. Hidiroglou (2003). Design consistent estimators for
    a mixed linear model on survey data. Proceedings of the Survey Research Methods
    Section, American Statistical Association (2003), 1897–1904. Molina, I. and J.
    Rao (2010). Small area estimation of poverty indicators. Canadian Journal of Statistics
    38 (3), 369–385. Rao, J. N. and I. Molina (2015). Small area estimation. John
    Wiley & Sons. Tarozzi, A. and A. Deaton (2009). Using census and survey data to
    estimate poverty and inequality for small areas. The review of economics and statistics
    91 (4), 773–792. Van der Weide, R. (2014). GLS estimation and empirical bayes
    prediction for linear mixed models with heteroskedasticity and sampling weights:
    a background study for the povmap project. World Bank Policy Research Working
    Paper (7028). Zhao, Q. (2006). User manual for povmap. World Bank. http://siteresources.worldbank.org/INTPGI/
    Resources/342674-1092157888460/Zhao_ManualPovMap.pdf .'
  authors:
  - Minh Cong Nguyen, mnguyen3@worldbank.org
  - Paul Andres Corral Rodas, pcorralrodas@worldbank.org
  - Joao Pedro Azevedo, jazevedo@worldbank.org
  - Qinghua Zhao, qzhao@worldbank.org
  - World Bank
  acknowledgements: 'We would like to thank all the users for their comments during
    the initial development of the codes.

    All errors and ommissions are exclusively our responsibility.'
  also_see: []
  version: '{* *! version 1.0.0 11nov2017}...'
  other_title: 'help for sae World Bank/Poverty and Equity GP - GSG1 ... }Introduction
    to sae - small area estimation packages ... [Suggestion: Read [SAE] intro substantive
    first.] ...'
  remarks: 'Remarks are presented under the following headings: A simple example Suggested
    reading order ...'
  citation: 'sae is a user-written program that is freely distributed to the research
    community. Please use the following citation: World Bank. (2017). “Small Area
    Estimation: An extended ELL approach.”. World Bank.'
