# Manual Publications Database
# 
# PURPOSE: Hand-curated publications NOT available in automated satellite databases
# AUTHORITY: This file is the source of truth for:
#   - Books (rarely in RePEc/OKR)
#   - Book chapters (not systematically indexed)
#   - Conference papers (often not in OKR)
#   - Historical publications (pre-2000)
#
# DO NOT ADD:
#   - Working papers (use fetch_repec_stats.py → okr_publications.yml)
#   - Software (use scrape_stata_help_files.py → stata_help_files.yml)
