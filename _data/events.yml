# === SCHEMA REFERENCE ===
# Required fields: id, date, year, event, location, role
# Optional fields: All others - only include if you have the data
#
# Field definitions:
#   id:                    Unique identifier (kebab-case: "unsc56-ai-2025")
#   date:                  ISO date YYYY-MM-DD
#   year:                  Integer for filtering
#   event:                 Official event name
#   event_type:            conference | summit | workshop | side_event | webinar | seminar | university_talk | guest_lecture | public_lecture
#   location:              "City, Country" or "Virtual"
#   venue:                 Specific venue (e.g., "United Nations Headquarters")
#   scope:                 international | regional | national | local
#   session:               Session/panel title
#   session_type:          keynote | panel | paper | roundtable | workshop
#   presentation_title:    Your specific talk title (if distinct from session)
#   abstract:              Summary of your intellectual contribution
#   role:                  Speaker | Panelist | Presenter | Keynote | Chair | Organizer | Delegate
#   role_type:             invited | keynote | peer_reviewed | organizer | delegate
#   affiliation:           Your organization at time of event
#   affiliation_role:      Your job title at time of event
#   participants:          Other panelists/speakers - list of {name, title, org, role}
#   organizers:            List of organizing institutions
#   audience_size:         Estimated number of attendees
#   countries_represented: Number of countries (for international events)
#   urls:
#     event:               Official event homepage
#     session:             Session-specific page
#     program:             PDF program or agenda
#     recording:           Video/audio recording
#     slides:              Your presentation file
#     news:                Press coverage or recap
#   evidence:              Files you have saved for documentation
#     invitation:          Path to invitation letter
#     program:             Path to saved program
#     slides:              Path to your slides
#     recording:           Path to saved recording
#     photo:               Path to event photo
#   description:           Additional context/notes
#   tags:                  Thematic tags for filtering
#
# Tag Taxonomy:
#   learning        📚 Learning & education measurement, assessments
#   statistics      📊 Official statistics, methodology, standards
#   governance      🏛️ Data governance, policies, frameworks
#   sdg             🎯 SDG monitoring, indicator frameworks
#   child-wellbeing 👶 Child welfare, MICS, child outcomes
#   poverty         💰 Poverty, inequality measurement
#   mobility        🔄 Social mobility, intergenerational dynamics
#   partnerships    🤝 International partnerships, data alliances
#   africa          🌍 Africa-focused events
#   digital         💻 Digital tools, AI, technology in statistics


