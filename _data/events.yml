  abstract: "Presented findings from the landmark report published jointly by World Bank, UNESCO, \nUNICEF, UK FCDO, USAID, and Bill & Melinda Gates Foundation. Key findings: Learning \npoverty increased from 57% pre-pandemic to 70% of 10-year-olds unable to read simple \ntext. This generation risks losing $21 trillion in potential lifetime earnings (17% of \nglobal GDP). Discussed policy frameworks for accelerating learning recovery.\n"
