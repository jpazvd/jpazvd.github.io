- id: lames-new-deal-2006
  date: '2006-11-03'
  year: 2006
  event: LACEA-LAMES 2006 Parallel Meetings
  event_type: conference
  location: Mexico City, Mexico
  venue: ITAM
  scope: international
  session: Education II
  presentation_title: The Econometric Evaluation of the New Deal for Lone Parents
  abstract: "This paper evaluates the New Deal for Lone Parents, a large voluntary program for single \nparents in the United Kingdom that provides information and limited financial support to \nlone parents. We apply semi-parametric matching methods to a large administrative dataset, \nand estimate substantive and fairly persistent effects of NDLP participation on the \nprobability of benefit receipt; these impacts are larger for the \"stock\" of long term \nrecipients than for the \"flow\" of new recipients. Finally, we find that taking account \nof the stratification in our data by applying propensity score matching within strata \nmakes a difference to our estimates.\n"
  session_type: paper
  role: Conference Presenter
  role_type: peer_reviewed
  affiliation: IPEA & University of Newcastle
  affiliation_role: PhD Candidate
  participants:
  - name: Peter Dolton
    title: Professor
    org: Royal Holloway, University of London
    role: co-author
  - name: Jeffrey Smith
    title: Professor
    org: University of Michigan
    role: co-author
  - name: Alfonso Miranda
    role: session_chair
  organizers:
  - LACEA
  - Econometric Society
  - ITAM
  evidence:
    submission: 'Paper Submission #111, Participant IDENT #18901'
  urls:
    event: http://www.lacealames2006.itam.mx/
  description: Peer-reviewed paper presentation at joint LACEA-LAMES meetings. Co-authored with Prof. Peter Dolton (Royal Holloway) and Prof. Jeffrey Smith (University of Michigan). Applied semi-parametric matching methods to evaluate UK welfare-to-work program.
  tags:
  - statistics
  - poverty
- id: lacea-microfinance-2006
  date: '2006-11-03'
  year: 2006
  event: LACEA-LAMES 2006 Parallel Meetings
  event_type: conference
  location: Mexico City, Mexico
  venue: ITAM
  scope: international
  presentation_title: 'Liquidity Constraint and Enterprise Performance: Evidence from Microfinance Clients'
  abstract: "This paper uses the administrative record of two microfinance institutions to analyze \nthe impact of credit on microentrepreneurs. First, it explores the relationship between \ncredit constraint, defined as unmet credit demand, and enterprise performance using an \nunbalanced panel of credit borrowers. The study shows a negative, but nonlinear, effect \nof credit constraint. This work also identifies the type of financial constraints by \nlooking at limited liability and moral hazard models. Nonparametric and reduced form \nestimation techniques support the limited liability model. Policy recommendations are \nthe reduction of transaction costs and quality improvements on collateral available \nto these microentrepreneurs.\n"
  session_type: paper
  role: Conference Presenter
  role_type: peer_reviewed
  affiliation: IPEA & University of Newcastle
  affiliation_role: PhD Candidate
  organizers:
  - LACEA
  - ITAM
  evidence:
    submission: 'Paper Submission #112, Participant IDENT #18901'
  urls:
    event: http://www.lacealames2006.itam.mx/
  description: Second paper presented at LACEA 2006. Sole-authored research using administrative records from microfinance institutions to analyze credit constraints on microentrepreneurs in favelas.
  tags:
  - poverty
  - mobility
