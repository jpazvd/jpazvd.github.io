- id: pakistan-datafest-2024
  date: '2024-10-21'
  year: 2024
  event: Pakistan DataFest 2024
  event_type: conference
  location: Islamabad, Pakistan
  venue: Pakistan Bureau of Statistics
  scope: national
  session: 'Data For Life and Equity: Closing Human Capital Gaps'
  session_type: panel
  presentation_title: 'Education and Human Capital: A Life Course Approach'
  abstract: "Keynote presentation covering: (1) The demographic urgency - 100% of workforce entering \nlabor market in 2050 has already been born, with 90% in Low- and Middle-Income countries;\n(2) The unprecedented challenge facing Sub-Saharan African education systems to deliver \nat scale during demographic boom; (3) Data gaps for children across SDG indicators and \nprogress in measurement standards; (4) Learning Poverty as early-warning indicator and \nevidence of the Matthew effect in learning; (5) The Life-Course Index measuring how \nchildren, adolescents, and youth survive and thrive across dimensions; (6) Perception \ngaps among government officials who significantly overestimate student reading ability.\nFinal remarks emphasized the need for greater intentionality in what, how, and why we \nmeasure to inform policies, programs, and practices.\n"
  role: Keynote Speaker
  role_type: keynote
  affiliation: UNICEF
  affiliation_role: Chief Statistician
  participants:
  - name: Dr. Shahid Soraya
    title: Director General
    org: PIE, Government of Pakistan
    role: panelist
  - name: Ms. Baela Raza Jamil
    org: Idara-e-Taleem-o-Aagahi (ITA)
    role: moderator
  - name: Ms. Jessica Albert
    org: LUMS
    role: panelist
  - name: Dr. Shireen Mustafa Narejo
    org: Provincial Government
    role: panelist
  - name: Prof. Dr. Bushra Mirza
    org: HEC, Government of Pakistan
    role: panelist
  organizers:
  - Pakistan Bureau of Statistics
  urls:
    event: https://www.datafest.gov.pk/Datafest2024/panel2024
  evidence:
    slides: files/presentations/2024-pak-datafest-life-course.pptx
  description: Keynote speaker at Pakistan's premier data conference organized by the Pakistan Bureau of Statistics. Panel 'Data As a Powerful Tool for Change' focused on using data to support equity and access to education, what data tells us about educational equity in Pakistan, challenges in data use for advocacy, and promising practices in data-driven decision-making.
  tags:
  - learning
  - statistics
  - partnerships

