- id: isdc-2021
  date: '2021-07-26'
  year: 2021
  event: 39th International System Dynamics Conference
  event_type: conference
  location: Virtual (Chicago, USA)
  scope: international
  session_type: paper
  presentation_title: The Long-Term Effects of the COVID Pandemic on Human Capital
  abstract: "Education is central to achieving the World Bank Group's goals: it is a reliable route \nout of poverty because it has large and consistent returns to income for individuals \nand because it can drive economic growth. To understand the impact of the COVID pandemic \non education, a system dynamics model was used to complement the WBG's diagnostics work \nand international experience to provide a dynamic framework to help build a shared \nunderstanding on the critical elements required to achieve learning at early grade and \nat the end of primary, highlight the main interdependencies, and identify how they might \nreinforce or undermine one another. This tool informs critical elements of a clear \ntheory of change on how learning outcomes can be reached. The simulation model generates \nstructured conversation among policymakers, World Bank team members, and development \npartners regarding the country's initial conditions, possible parameter values, and how \nthose different\
    \ assumptions interact as they generate distinct trajectories of the \nsystem's performance. Results help strengthen the narrative on how countries can \naccelerate learning, and provide feedback on how theoretical frameworks can be improved.\n"
  role: Co-author/Presenter
  role_type: peer_reviewed
  affiliation: World Bank
  affiliation_role: Lead Economist
  participants:
  - name: Michael Bean
    org: Forio
    role: lead_author
  organizers:
  - System Dynamics Society
  urls:
    event: https://proceedings.systemdynamics.org/2021/
    session: https://proceedings.systemdynamics.org/2021/abstracts/1093.html
    proceedings: https://proceedings.systemdynamics.org/2021/abstracts/1093.html
  description: Peer-reviewed paper presentation at the 39th International Conference of the System Dynamics Society. Developed novel system dynamics simulation model to analyze COVID-19's long-term impacts on human capital accumulation and learning outcomes. Model used by World Bank country teams for policy dialogue.
  tags:
  - learning
  - statistics

