  session_type: paper
  presentation_title: Small Area Estimation/Poverty Map in Stata
  abstract: "Introduced new Stata package (sae/povmap) for small area estimations of poverty and \ninequality implementing methodologies from Elbers, Lanjouw, and Lanjouw (Econometrica, \n2003). Small area methods solve low representativeness of surveys within areas or lack \nof data for specific sub-populations by incorporating information from outside sources \nlike census data. Introduced new Mata functions and a plugin to circumvent memory \nlimitations when working with big data, enabling poverty mapping at unprecedented scale.\n"
