- id: geeap-literacy-launch-2025
  date: '2025-12-04'
  year: 2025
  event: 'Webinar: Effective Reading Instruction in Low- and Middle-Income Countries: What the Evidence Shows'
  event_type: webinar
  location: Virtual
  scope: international
  session_time: '9:00 AM – 10:30 AM ET'
  session: GEEAP-endorsed literacy report global launch panel discussion
  session_type: panel
  presentation_title: Panel speaker on reading instruction and literacy evidence
  abstract: |
    Participated in GEEAP webinar launch of evidence review on effective reading instruction 
    across 160+ languages and 151 studies in low- and middle-income countries. Panel discussion 
    addressed the learning crisis (70% of children in LMICs cannot read simple text by age 10) 
    and solutions: systematic adoption of evidence-based instruction teaching six core literacy 
    skills explicitly, systematically, and comprehensively.
  role: Panelist
  role_type: invited
  affiliation: UNICEF
  affiliation_role: Chief Statistician; Deputy Director, DAPM
  participants:
  - name: João Pedro Azevedo
    org: UNICEF
    title: Chief Statistician; Deputy Director, DAPM
    role: panelist
  - name: Martin Benavides
    org: UNESCO International Institute for Educational Planning (IIEP)
    title: Director
    role: panelist
  - name: Nathanael Bevan
    org: FCDO
    title: Deputy Director of What Works Research and Evidence
    role: panelist
  - name: Margaret (Peggy) Dubeck
    title: Consultant
    role: speaker
  - name: Rachel Glennerster
    org: Center for Global Development
    title: President; GEEAP member
    role: panelist
  - name: Rob Jenkins
    org: Harvard University
    title: Lecturer on Education, Faculty Co-Chair
    role: panelist
  - name: Ben Piper
    org: Bill & Melinda Gates Foundation
    title: Global Education; GEEAP member
    role: panelist
  - name: Jaime Saavedra
    org: World Bank
    title: Director of Human Development for Latin America and the Caribbean; GEEAP member
    role: panelist
  - name: Dr. Carlos Torrendel
    org: Ministerio de Capital Humano, Argentina
    title: Secretario de Educación
    role: panelist
  organizers:
  - World Bank
  - Global Evidence Advisory Panel (GEEAP)
  - FCDO
  - UNICEF
  urls:
    event: https://geeap.org/event/geeap-endorsed-literacy-report-global-launch/
  description: |
    GEEAP is an independent, cross-disciplinary body of renowned researchers co-convened by 
    the World Bank, the Foreign, Commonwealth & Development Office (FCDO), and UNICEF. 
    The webinar presented the GEEAP-endorsed paper "Effective Reading Instruction in Low- and 
    Middle-Income Countries: What the Evidence Shows," synthesizing evidence from 151 studies 
    across 160+ languages on what works in reading instruction and the critical skills for 
    literacy success. Panel discussed implications, promises, and implementation challenges for 
    scaling evidence-based literacy instruction globally.
  tags:
  - learning
  - partnerships
  - sdg
  - statistics

- id: adea-triennale-2025
  date: '2025-10-31'
  year: 2025
  event: ADEA Triennale 2025
  event_type: conference
  location: Accra, Ghana
  venue: Labadi Beach Hotel
  scope: regional
  session: Measurement in Foundational Learning in Africa
  session_type: panel
  presentation_title: 'UNICEF: Strengthening Learning Data Ecosystems for Africa'
  abstract: "Presented UNICEF's three-pillar approach to strengthening learning data ecosystems in Africa:\n(1) Data Generation through MICS Foundational Learning Module implemented in 55 countries \n(16 African), with ongoing revision to align with the Global Proficiency Framework (FLM2.0) \nand partnerships with governments to strengthen national assessments;\n(2) Data Transparency & Use through the Learning & Skills Data Lab bringing together \ncountry-level data on learning and skills to promote research and visual analytics;\n(3) Monitoring & Action through the Foundational Learning Action Tracker (FLAT) monitoring \ncommitments-to-actions in 124 countries.\n"
  role: Panelist
  role_type: invited
  affiliation: UNICEF
  affiliation_role: Chief Statistician
  participants:
  - name: Clio Dintilhac
    title: Senior Program Officer
    org: Bill & Melinda Gates Foundation
    role: panelist
  - name: Hilaire Hounkpodoté
    title: Coordinator
    org: PASEC/CONFEMEN
    role: panelist
  - name: Manos Antoninis
    title: Director
    org: UNESCO GEM Report
    role: panelist
  - name: Armando Ali
    role: panelist
  - name: Cally Ardington
    title: Director, DataFirst
    org: University of Cape Town
    role: panelist
  organizers:
  - ADEA
  - Ghana Ministry of Education
  - African Development Bank
  urls:
    event: https://triennale.adeanet.org/
  description: 'The ADEA Triennale is Africa''s flagship ministerial-level forum on education, themed ''Strengthening the resilience of Africa''s educational systems: advancing towards ending learning poverty by 2035.'' Panel under Sub-Theme 5 (Using Evidence and Digital Technology) discussed approaches to measuring foundational learning, data quality challenges, and coordination between regional and global monitoring frameworks including AFLAI and CESA.'
  evidence:
    slides: files/presentations/2025-adea-learning-ecosystems.pptx
    briefing: files/evidence/2025-adea-briefing-note.docx
