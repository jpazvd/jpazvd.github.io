# === SCHEMA REFERENCE ===
# Required fields: id, institution, course_title, level, years, role
# Optional fields: All others - only include if you have the data
#
# Field definitions:
#   id:                    Unique identifier (kebab-case: "puc-rio-poverty-metrics-2024")
#   institution:           University or organization name
#   institution_type:      university | training_program | government | multilateral | private
#   country:               Country where institution is based (for international)
#   course_code:           Official course code/number
#   course_title:          Official course name
#   level:                 undergraduate | graduate | professional | executive | workshop
#   years:                 Array of academic years taught (e.g., [2023, 2024, 2025])
#   semesters:             Spring | Fall | Summer | Both | Ongoing
#   duration_hours:        Total contact hours per semester
#   students_enrolled:     Typical enrollment number
#   role:                  Primary Instructor | Co-Instructor | Guest Lecturer | Curriculum Designer | Instructor of Record
#   affiliation:           Your organization at time of teaching (e.g., "World Bank", "UNICEF")
#   affiliation_role:      Your job title (e.g., "Senior Economist")
#   description:           Course overview, key topics, pedagogical approach
#   topics:                List of thematic tags [statistics, poverty, methodology, measurement, etc.]
#   pedagogical_approach:  Description of teaching methods (e.g., case studies, simulations, projects)
#   student_demographics:  Brief description of student background/level
#   assessment_methods:    How students are evaluated (exams, projects, presentations, etc.)
#   evidence:
#     syllabus:            Path to course syllabus
#     materials:           Path to lecture notes, slides, or materials folder
#     evaluations:         Path to student evaluations/feedback
#     assignments:         Path to sample assignments
#   notes:                 Additional context
#   urls:
#     course_page:         Link to official course page/catalog
#     materials:           Link to public course materials if available
#
# Tag Taxonomy:
#   statistics         📊 Statistical methods, data science
#   poverty            💰 Poverty measurement, inequality analysis
#   methodology        🔬 Research methods, econometrics
#   measurement        📏 Measurement frameworks, indicators
#   learning           📚 Education, learning outcomes
#   governance         🏛️ Policy, governance, public administration
#   sdg                🎯 SDG frameworks, sustainable development
#   child-wellbeing    👶 Child welfare, MICS
#   africa             🌍 Africa-focused content
#   digital            💻 Digital tools, AI, technology

