# === SCHEMA REFERENCE ===
# Required fields: id, date_start, year, institution, course_title, role
# Optional fields: All others - only include if you have the data
#
# Field definitions:
#   id:                    Unique identifier (kebab-case: "econometrics-nyc-2022")
#   date_start:            ISO date YYYY-MM-DD (course start date)
#   date_end:              ISO date YYYY-MM-DD (course end date, if applicable)
#   year:                  Integer for filtering (year course began)
#   years:                 Array of years for multi-year courses [2001, 2002, 2003]
#   institution:           University, organization, or venue
#   institution_type:      university | government | organization | training_program | other
#   country:               Country where teaching occurred
#   location:              "City, Country" or "Virtual" (optional)
#   course_title:          Official course name
#   course_code:           Academic course number/code if applicable
#   course_type:           course | seminar | workshop | tutorial | lecture_series | supervision | mentoring
#   level:                 undergraduate | graduate | professional | executive | general
#   students_count:        Number of students enrolled (if known)
#   semesters:             Semester/period description (e.g., "Academic Year", "July–August")
#   duration_hours:        Hours per week or total hours
#   description:           Course overview, learning objectives, and context
#   role:                  Instructor | Co-instructor | Training Instructor | Specialist Trainer | Co-Advisor | Committee Member
#   role_type:             primary | co-taught | guest | mentoring | supervision
#   affiliation:           Your affiliation/employer at time of teaching
#   affiliation_role:      Your job title at time of teaching
#   language:              Language of instruction (English, Portuguese, Spanish, etc.)
#   format:                in-person | hybrid | online | asynchronous
#   frequency:             one-time | semester | annual | recurring
#   pedagogical_approach:  Teaching methodology/approach used
#   assessment_methods:    How students were evaluated
#   student_demographics:  Description of student population
#   student_outcomes:      Notable student achievements/placements
#   feedback_summary:      Summary of student feedback/evaluations
#   co_instructors:        Co-teachers/collaborators - list of {name, title, org, role}
#   organizations:         Collaborating institutions
#   urls:                  Web links (same structure as events.yml)
#     syllabus:            Link to course syllabus
#     website:             Course website/LMS page
#     materials:           Link to teaching materials
#     recordings:          Link to recorded lectures
#   evidence:              Files you have saved for documentation (same structure as events.yml)
#     syllabus:            Path to saved syllabus
#     materials:           Path to course materials folder
#     assignments:         Path to sample assignments
#     grade_distribution:  Path to anonymized grade data
#     student_feedback:    Path to student evaluations
#     certificate:         Path to teaching certificate
#   notes:                 Additional context/administrative notes
#   tags:                  Thematic tags for filtering (consolidates topics + tags)
#
# Tag Taxonomy:
#   econometrics       📊 Econometrics, causal inference, regression methods
#   statistics         📈 Statistics, probability, data analysis
#   development        🌍 Development economics, poverty measurement
#   evaluation         📋 Program evaluation, impact assessment
#   learning           📚 Learning outcomes, education measurement
#   data-science       💻 Data science, programming, computational methods
#   supervision        👥 PhD/Master supervision, mentoring
#   seminar            🎓 Seminars, workshops, short courses
#   methodology        🔬 Research methodology, quantitative methods
#   policy             🏛️ Policy analysis, governance, applied work
#   inequality         💰 Inequality measurement, poverty analysis
#   public-health      ⚕️ Public health, demography, health data


