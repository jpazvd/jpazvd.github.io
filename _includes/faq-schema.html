<!-- FAQPage JSON-LD Schema — generated from _data/faq.yml (the SAME source as
     the visible FAQ on /research/), with numbers substituted from
     _data/citations.yml + _data/facts.yml. Never hand-edit answers here. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {%- for faq in site.data.faq.faqs %}
    {
      "@type": "Question",
      "name": {{ faq.question | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {% capture faq_rendered %}{% include render-faq-answer.html text=faq.answer %}{% endcapture %}{{ faq_rendered | jsonify }}
      }
    }{% unless forloop.last %},{% endunless %}
    {%- endfor %}
  ]
}
</script>
